<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sommarbingo U11-U13</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17"></script>
<script src="./config.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --text:#f1f5f9;
    --muted:#94a3b8; --accent:#22c55e; --accent2:#f59e0b; --danger:#ef4444;
    --done:#22c55e; --shadow:0 4px 14px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f172a,#1e293b); color:var(--text); min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:1100px; margin:0 auto; padding:16px}
  header{text-align:center; padding:8px 0 16px}
  header h1{margin:0 0 4px; font-size:clamp(20px,4vw,30px)}
  header .sub{color:var(--muted); font-size:14px}
  .lang-toggle{display:inline-flex; gap:0; margin:8px 0 0; border:1px solid var(--panel2); border-radius:8px; overflow:hidden}
  .lang-toggle button{background:var(--panel); color:var(--muted); border:none; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit}
  .lang-toggle button.active{background:var(--accent); color:#052e16}
  .progress-wrap{background:var(--panel); border-radius:999px; height:14px; overflow:hidden; margin:14px 0 4px; box-shadow:var(--shadow)}
  .progress-bar{height:100%; background:linear-gradient(90deg,var(--accent),#16a34a); width:0; transition:width .4s ease}
  .progress-text{text-align:center; color:var(--muted); font-size:13px; margin-bottom:14px}
  .prize{display:none; text-align:center; background:linear-gradient(90deg,#f59e0b,#fbbf24); color:#1e293b; font-weight:700; padding:12px; border-radius:12px; margin:10px 0; box-shadow:var(--shadow)}
  .prize.show{display:block; animation:pop .5s}
  @keyframes pop{0%{transform:scale(.8)}100%{transform:scale(1)}}

  .toolbar{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:10px 0 16px}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; transition:transform .1s, background .2s}
  button:active{transform:scale(.96)}
  .btn-primary{background:var(--accent); color:#052e16}
  .btn-secondary{background:var(--panel2); color:var(--text)}
  .btn-danger{background:var(--danger); color:#fff}
  .btn-warn{background:var(--accent2); color:#1e293b}

  .bingo{display:grid; grid-template-columns:repeat(6,1fr); gap:6px}
  .cell{
    background:var(--panel); border:2px solid transparent; border-radius:10px;
    padding:10px 8px; font-size:12px; line-height:1.35; min-height:96px;
    display:flex; flex-direction:column; justify-content:space-between; cursor:pointer;
    transition:all .15s; user-select:none; position:relative;
  }
  .cell:hover{border-color:var(--accent)}
  .cell.done{background:linear-gradient(160deg,#14532d,#22c55e22); border-color:var(--done); color:#bbf7d0}
  .cell.done .check{opacity:1}
  .cell .num{position:absolute; top:4px; left:6px; font-size:10px; color:var(--muted); font-weight:700}
  .cell .txt{flex:1; padding-top:10px}
  .cell .check{position:absolute; top:4px; right:6px; font-size:16px; opacity:0; transition:opacity .2s}
  .cell.styrke{border-color:var(--accent2); box-shadow:inset 0 0 0 1px var(--accent2)}
  .cell.styrke .badge{position:absolute; bottom:4px; right:6px; font-size:9px; background:var(--accent2); color:#1e293b; padding:1px 5px; border-radius:6px; font-weight:700}

  .login-overlay{position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px}
  .login-card{background:var(--panel); border-radius:16px; padding:24px; max-width:380px; width:100%; box-shadow:var(--shadow)}
  .login-card h2{margin:0 0 4px; text-align:center}
  .login-card .desc{color:var(--muted); font-size:13px; text-align:center; margin-bottom:18px}
  .login-card label{display:block; font-size:13px; color:var(--muted); margin:10px 0 4px}
  .login-card input{width:100%; padding:12px; border-radius:10px; border:2px solid var(--panel2); background:var(--bg); color:var(--text); font-size:16px; font-family:inherit}
  .login-card input:focus{outline:none; border-color:var(--accent)}
  .login-card .btn-primary{width:100%; margin-top:16px; padding:14px}
  .user-bar{display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:13px; margin-bottom:8px}
  .user-bar .name{color:var(--accent); font-weight:700}
  .sync-status{font-size:11px; color:var(--muted)}
  .sync-status.ok{color:var(--accent)}
  .sync-status.err{color:var(--danger)}

  .modal{position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:50; padding:12px}
  .modal.show{display:flex}
  .modal-card{background:var(--panel); border-radius:16px; max-width:560px; width:100%; max-height:92vh; overflow:auto; box-shadow:var(--shadow); padding:20px}
  .modal-card h2{margin:0 0 4px; font-size:20px; color:var(--accent2)}
  .modal-card .desc{color:var(--muted); font-size:13px; margin-bottom:14px}
  .step-list{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .step-item{display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--panel2); border-radius:10px; cursor:pointer; border:2px solid transparent}
  .step-item.active{border-color:var(--accent2); background:#3f2a05}
  .step-item.done{opacity:.6; text-decoration:line-through}
  .step-item .idx{font-weight:700; color:var(--muted); min-width:24px}
  .step-item .label{flex:1; font-size:14px}
  .step-item .stat{font-size:12px; color:var(--accent); font-weight:700}

  .active-step{background:var(--panel2); border-radius:12px; padding:16px; margin-bottom:14px}
  .active-step h3{margin:0 0 6px; font-size:18px}
  .active-step .hint{color:var(--muted); font-size:13px; margin-bottom:14px}
  .counter-display{font-size:48px; font-weight:800; text-align:center; color:var(--accent); margin:8px 0}
  .counter-display .target{color:var(--muted); font-size:20px; font-weight:500}
  .counter-btns{display:flex; gap:8px; justify-content:center; margin:10px 0}
  .counter-btns button{width:56px; height:56px; font-size:24px; border-radius:50%}
  .tap-area{background:var(--panel); border:2px dashed var(--accent); border-radius:12px; padding:20px; text-align:center; cursor:pointer; margin:10px 0; font-size:14px; color:var(--muted)}
  .tap-area:active{background:var(--accent); color:#052e16}

  .timer-display{font-size:56px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums; margin:8px 0}
  .timer-display.warn{color:var(--danger)}
  .timer-progress{height:8px; background:var(--panel); border-radius:999px; overflow:hidden; margin:6px 0 14px}
  .timer-progress > div{height:100%; background:var(--accent); transition:width .3s linear}

  .nav-btns{display:flex; gap:8px; justify-content:space-between; margin-top:14px}
  .complete-banner{display:none; text-align:center; background:var(--accent); color:#052e16; padding:14px; border-radius:12px; font-weight:700; margin:10px 0}
  .complete-banner.show{display:block; animation:pop .5s}

  @media (max-width:640px){
    .bingo{grid-template-columns:repeat(3,1fr)}
    .cell{min-height:80px; font-size:11px}
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>🎯 Sommarbingo</h2>
    <div class="lang-toggle" style="display:block; text-align:center; margin-bottom:12px">
      <button id="langSvLogin" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEnLogin" onclick="setLang('en')">EN</button>
    </div>
    <div class="desc" id="loginDesc"></div>
    <label for="loginName" id="lblName"></label>
    <input id="loginName" type="text" placeholder="t.ex. Ella / e.g. Ella" autocomplete="off">
    <label for="loginTeam" id="lblTeam"></label>
    <input id="loginTeam" type="text" placeholder="t.ex. GBK" autocomplete="off">
    <button class="btn-primary" id="loginBtn"></button>
    <div class="sync-status" id="loginStatus" style="text-align:center; margin-top:10px"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <header>
    <h1>🎯 <span id="hTitle"></span></h1>
    <div class="sub" id="hSub"></div>
    <div class="lang-toggle">
      <button id="langSv" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="user-bar">
    <span id="lblPlayer"></span>: <span class="name" id="userName"></span> ·
    <span id="lblTeamBar"></span>: <span class="name" id="userTeam"></span> ·
    <span class="sync-status" id="syncStatus">⟳</span>
    <button class="btn-secondary" id="logoutBtn" style="padding:4px 10px; font-size:12px"></button>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progBar"></div></div>
  <div class="progress-text" id="progText"></div>
  <div class="prize" id="prize"></div>

  <div class="toolbar">
    <button class="btn-primary" id="openStyrke"></button>
    <button class="btn-secondary" id="resetBtn"></button>
  </div>

  <div class="bingo" id="bingo"></div>
</div>

<div class="modal" id="styrkeModal">
  <div class="modal-card">
    <h2>💪 <span id="styrkeTitle"></span></h2>
    <div class="desc" id="styrkeDesc"></div>
    <div class="step-list" id="stepList"></div>
    <div class="active-step" id="activeStep">
      <h3 id="asTitle"></h3>
      <div class="hint" id="asHint"></div>
      <div id="asBody"></div>
    </div>
    <div class="complete-banner" id="styrkeDone"></div>
    <div class="nav-btns">
      <button class="btn-secondary" id="prevBtn"></button>
      <button class="btn-warn" id="skipBtn"></button>
      <button class="btn-secondary" id="nextBtn"></button>
    </div>
    <div style="text-align:center; margin-top:12px">
      <button class="btn-danger" id="closeStyrke"></button>
    </div>
  </div>
</div>

<script>
// ---------- i18n ----------
let lang = localStorage.getItem("sommarbingo.lang") || "sv";
const I18N = {

  }
};
function t(key){ const v = I18N[lang][key]; return typeof v === "function" ? v : v; }

// ---------- Data (bilingual) ----------
const BINGO = [
  [
    {sv:"Hoppa 2 x 100 hopprep (backa 5 om du missar)", en:"Jump 2 x 100 jump rope (go back 5 if you miss)"},

// ---------- State ----------
const KEY_PLAYER = "sommarbingo.player.v2";
const KEY_BINGO = "sommarbingo.bingo.v2";
const KEY_STYRKE = "sommarbingo.styrke.v2";
let player = JSON.parse(localStorage.getItem(KEY_PLAYER) || "null");
let bingoState = JSON.parse(localStorage.getItem(KEY_BINGO) || "[]");
let styrkeState = JSON.parse(localStorage.getItem(KEY_STYRKE) || "[]");
let currentStep = 0;
let timerHandle = null;
let awDatabases = null;
let syncTimer = null;

// ---------- Appwrite ----------
function initAppwrite(){
  if (window.APPWRITE_PROJECT_ID && window.APPWRITE_PROJECT_ID !== "YOUR_PROJECT_ID" && window.Appwrite){
    try {
      const client = new window.Appwrite.Client()
        .setEndpoint(window.APPWRITE_ENDPOINT)
        .setProject(window.APPWRITE_PROJECT_ID);
      awDatabases = new window.Appwrite.Databases(client);
    } catch(e){ console.warn("Appwrite init failed", e); }
  }
}

function setSync(status, msg){
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.className = "sync-status " + (status || "");
  el.textContent = msg || (status === "ok" ? t("syncSaved") : status === "err" ? t("syncOffline") : "⟳");
}

function rowId(){
  return (player.name + "_" + player.team).toLowerCase().replace(/[^a-z0-9._-]/g, "_").slice(0, 36);
}

async function syncPush(){
  if (!awDatabases || !player) return;
  setSync("", t("syncSaving"));
  try {
    const payload = {
      player_name: player.name,
      team_code: player.team,
      bingo: JSON.stringify(bingoState),
      styrke: JSON.stringify(styrkeState),
      updated_at: new Date().toISOString()
    };
    try {
      await awDatabases.updateDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId(), payload);
    } catch(updateErr){
      if (updateErr.code === 404 || (updateErr.message || "").includes("not found")){
        await awDatabases.createDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId(), payload);
      } else { throw updateErr; }
    }
    setSync("ok", t("syncSaved"));
  } catch(e){
    console.warn(e);
    setSync("err", t("syncOffline"));
  }
}

async function syncPull(){
  if (!awDatabases || !player) return;
  try {
    const doc = await awDatabases.getDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId());
    if (doc){
      bingoState = safeParse(doc.bingo, []);
      styrkeState = safeParse(doc.styrke, []);
      localStorage.setItem(KEY_BINGO, JSON.stringify(bingoState));
      localStorage.setItem(KEY_STYRKE, JSON.stringify(styrkeState));
      renderBingo();
      setSync("ok", t("syncSynced"));
    }
  } catch(e){
    if (e.code !== 404){ console.warn(e); setSync("err", t("syncLoadFail")); }
    else { setSync("ok", t("syncNewPlayer")); }
  }
}

function safeParse(s, fallback){
  try { return JSON.parse(s) || fallback; } catch(e){ return fallback; }
}

// ---------- Lang ----------
function setLang(l){
  lang = l;
  localStorage.setItem("sommarbingo.lang", l);
  document.documentElement.lang = l;
  document.getElementById("langSv").classList.toggle("active", l === "sv");
  document.getElementById("langEn").classList.toggle("active", l === "en");
  document.getElementById("langSvLogin").classList.toggle("active", l === "sv");
  document.getElementById("langEnLogin").classList.toggle("active", l === "en");
  applyTexts();
  renderBingo();
  if (document.getElementById("styrkeModal").classList.contains("show")){
    renderStepList();
    showStep(currentStep);
  }
}

function applyTexts(){
  document.getElementById("hTitle").textContent = t("hTitle");
  document.getElementById("hSub").textContent = t("hSub");
  document.getElementById("loginDesc").textContent = t("loginDesc");
  document.getElementById("lblName").textContent = t("lblName");
  document.getElementById("lblTeam").textContent = t("lblTeam");
  document.getElementById("loginBtn").textContent = t("loginBtn");
  document.getElementById("lblPlayer").textContent = t("lblPlayer");
  document.getElementById("lblTeamBar").textContent = t("lblTeamBar");
  document.getElementById("logoutBtn").textContent = t("logout");
  document.getElementById("openStyrke").textContent = t("openStyrke");
  document.getElementById("resetBtn").textContent = t("reset");
  document.getElementById("prize").textContent = t("prize");
  document.getElementById("styrkeTitle").textContent = t("styrkeTitle");
  document.getElementById("styrkeDesc").textContent = t("styrkeDesc");
  document.getElementById("prevBtn").textContent = t("prev");
  document.getElementById("skipBtn").textContent = t("skip");
  document.getElementById("nextBtn").textContent = t("next");
  document.getElementById("closeStyrke").textContent = t("closeStyrke");
  document.getElementById("styrkeDone").textContent = t("styrkeDone");
  updateProgress();
}

// ---------- Login ----------
function showLogin(){
  document.getElementById("loginOverlay").style.display = "flex";
  document.getElementById("appWrap").style.display = "none";
  if (window.DEFAULT_TEAM_CODE){
    document.getElementById("loginTeam").value = window.DEFAULT_TEAM_CODE;
  }
}
function hideLogin(){
  document.getElementById("loginOverlay").style.display = "none";
  document.getElementById("appWrap").style.display = "block";
}

function doLogin(){
  const name = document.getElementById("loginName").value.trim();
  const team = document.getElementById("loginTeam").value.trim();
  const status = document.getElementById("loginStatus");
  if (!name){ status.textContent = t("loginNoName"); return; }
  if (!team){ status.textContent = t("loginNoTeam"); return; }
  player = { name, team };
  localStorage.setItem(KEY_PLAYER, JSON.stringify(player));
  hideLogin();
  document.getElementById("userName").textContent = name;
  document.getElementById("userTeam").textContent = team;
  renderBingo();
  syncPull();
}

function doLogout(){
  if (!confirm(t("logoutConfirm"))) return;
  localStorage.removeItem(KEY_PLAYER);
  player = null;
  showLogin();
}

// ---------- Bingo ----------
function saveBingo(){ localStorage.setItem(KEY_BINGO, JSON.stringify(bingoState)); scheduleSync(); }
function saveStyrke(){ localStorage.setItem(KEY_STYRKE, JSON.stringify(styrkeState)); scheduleSync(); }

function scheduleSync(){
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(syncPush, 800);
}

function renderBingo(){
  const grid = document.getElementById("bingo");
  if (!grid) return;
  grid.innerHTML = "";
  BINGO.forEach((row, r) => row.forEach((cell, c) => {
    const idx = r*6 + c;
    const isStyrke = cell === "STYRKE";
    const label = isStyrke ? t("styrkeCellLabel") : cell[lang];
    const done = bingoState.includes(idx);
    const el = document.createElement("div");
    el.className = "cell" + (done ? " done" : "") + (isStyrke ? " styrke" : "");
    el.innerHTML = `<span class="num">${idx+1}</span><span class="check">✓</span>${isStyrke?'<span class="badge">💪</span>':''}<div class="txt">${label}</div>`;
    el.onclick = () => toggleBingo(idx);
    grid.appendChild(el);
  }));
  updateProgress();
}

function toggleBingo(idx){
  const i = bingoState.indexOf(idx);
  if (i >= 0) bingoState.splice(i,1); else bingoState.push(idx);
  saveBingo(); renderBingo();
}

function setBingoDone(idx, done){
  const i = bingoState.indexOf(idx);
  if (done && i < 0) bingoState.push(idx);
  if (!done && i >= 0) bingoState.splice(i,1);
  saveBingo();
}

function updateProgress(){
  const total = 30;
  const n = bingoState.length;
  const pct = Math.min(100, Math.round(n/total*100));
  document.getElementById("progBar").style.width = pct + "%";
  document.getElementById("progText").textContent = t("progText")(n, total, pct);
  document.getElementById("prize").classList.toggle("show", n === total);
}

// ---------- Styrkegymnastik ----------
function openStyrke(){
  document.getElementById("styrkeModal").classList.add("show");
  renderStepList();
  showStep(currentStep);
}
function closeStyrke(){
  document.getElementById("styrkeModal").classList.remove("show");
  stopTimer();
}

function renderStepList(){
  const list = document.getElementById("stepList");
  list.innerHTML = "";
  STYRKE.forEach((s, i) => {
    const st = styrkeState[i] || {done:false};
    const el = document.createElement("div");
    el.className = "step-item" + (i === currentStep ? " active" : "") + (st.done ? " done" : "");
    const stat = st.done ? "✓" : (s.type === "reps" ? `${st.count||0}/${s.target}` : s.type === "timer" ? `${st.elapsed||0}s/${s.target*(s.sets||1)}s` : "");
    el.innerHTML = `<span class="idx">${i+1}</span><span class="label">${s.t[lang]}</span><span class="stat">${stat}</span>`;
    el.onclick = () => { stopTimer(); currentStep = i; renderStepList(); showStep(i); };
    list.appendChild(el);
  });
}

function showStep(i){
  currentStep = i;
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false};
  document.getElementById("asTitle").textContent = `${i+1}. ${s.t[lang]}`;
  document.getElementById("asHint").textContent = s.hint[lang] || "";
  const body = document.getElementById("asBody");
  body.innerHTML = "";

  if (s.type === "info"){
    body.innerHTML = `<div class="tap-area" id="infoDone">${t("infoDone")}</div>`;
    document.getElementById("infoDone").onclick = () => markStyrkeDone(i);
  } else if (s.type === "reps"){
    const count = st.count || 0;
    body.innerHTML = `
      <div class="counter-display"><span id="repCount">${count}</span><span class="target"> / ${s.target}</span></div>
      <div class="counter-btns">
        <button class="btn-secondary" id="repMinus">−</button>
        <button class="btn-primary" id="repPlus">+</button>
      </div>
      <div class="tap-area" id="repTap">${t("repTap")}</div>
    `;
    document.getElementById("repMinus").onclick = () => updateRep(i, -1);
    document.getElementById("repPlus").onclick = () => updateRep(i, +1);
    document.getElementById("repTap").onclick = () => updateRep(i, +1);
  } else if (s.type === "timer"){
    const sets = s.sets || 1;
    const curSet = (st.setIdx || 0) + 1;
    const elapsed = st.elapsed || 0;
    const remaining = s.target - elapsed;
    body.innerHTML = `
      ${sets > 1 ? `<div style="text-align:center; color:var(--accent2); font-weight:700; margin-bottom:6px">${t("setLabel")(curSet, sets)}</div>` : ""}
      <div class="timer-display" id="timerDisp">${fmtTime(remaining)}</div>
      <div class="timer-progress"><div id="timerProg" style="width:${(elapsed/s.target)*100}%"></div></div>
      <div class="counter-btns">
        <button class="btn-primary" id="timerStart">${t("timerStart")}</button>
        <button class="btn-secondary" id="timerPause">${t("timerPause")}</button>
        <button class="btn-danger" id="timerReset">${t("timerReset")}</button>
      </div>
    `;
    document.getElementById("timerStart").onclick = () => startTimer(i);
    document.getElementById("timerPause").onclick = () => stopTimer();
    document.getElementById("timerReset").onclick = () => resetTimer(i);
  }
  renderStepList();
  checkAllStyrkeDone();
}

function updateRep(i, delta){
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false, count:0};
  st.count = Math.max(0, Math.min(s.target, (st.count||0) + delta));
  st.done = st.count >= s.target;
  styrkeState[i] = st;
  saveStyrke();
  if (st.done){ markStyrkeDone(i, false); } else { showStep(i); }
}

function startTimer(i){
  stopTimer();
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false, elapsed:0, setIdx:0};
  styrkeState[i] = st;
  timerHandle = setInterval(() => {
    st.elapsed = (st.elapsed || 0) + 1;
    const disp = document.getElementById("timerDisp");
    const prog = document.getElementById("timerProg");
    const remaining = s.target - st.elapsed;
    if (disp) {
      disp.textContent = fmtTime(Math.max(0, remaining));
      disp.classList.toggle("warn", remaining <= 5 && remaining > 0);
    }
    if (prog) prog.style.width = (st.elapsed/s.target)*100 + "%";
    if (st.elapsed >= s.target){
      stopTimer();
      const sets = s.sets || 1;
      if ((st.setIdx || 0) + 1 < sets){
        st.setIdx = (st.setIdx || 0) + 1;
        st.elapsed = 0;
        saveStyrke();
        showStep(i);
      } else {
        st.done = true;
        saveStyrke();
        markStyrkeDone(i, true);
      }
    }
    saveStyrke();
    renderStepList();
  }, 1000);
}
function stopTimer(){ if (timerHandle){ clearInterval(timerHandle); timerHandle = null; } }
function resetTimer(i){
  stopTimer();
  const st = styrkeState[i] || {};
  st.elapsed = 0; st.setIdx = 0; st.done = false;
  styrkeState[i] = st;
  saveStyrke();
  showStep(i);
}

function markStyrkeDone(i, silent){
  const st = styrkeState[i] || {done:false};
  st.done = true;
  styrkeState[i] = st;
  saveStyrke();
  stopTimer();
  if (!silent) showStep(i);
  checkAllStyrkeDone();
  renderStepList();
}

function checkAllStyrkeDone(){
  const allDone = STYRKE.every((_, i) => (styrkeState[i] || {}).done);
  document.getElementById("styrkeDone").classList.toggle("show", allDone);
}

function fmtTime(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

// ---------- Nav ----------
document.getElementById("prevBtn").onclick = () => { stopTimer(); if (currentStep > 0){ currentStep--; showStep(currentStep); } };
document.getElementById("nextBtn").onclick = () => { stopTimer(); if (currentStep < STYRKE.length - 1){ currentStep++; showStep(currentStep); } };
document.getElementById("skipBtn").onclick = () => { stopTimer(); if (currentStep < STYRKE.length - 1){ currentStep++; showStep(currentStep); } };
document.getElementById("openStyrke").onclick = openStyrke;
document.getElementById("closeStyrke").onclick = closeStyrke;
document.getElementById("styrkeModal").onclick = (e) => { if (e.target.id === "styrkeModal") closeStyrke(); };
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("logoutBtn").onclick = doLogout;
document.getElementById("resetBtn").onclick = () => {
  if (confirm(t("resetConfirm"))){
    bingoState = []; styrkeState = []; currentStep = 0;
    saveBingo(); saveStyrke();
    renderBingo();
    document.getElementById("styrkeDone").classList.remove("show");
    syncPush();
  }
};

// ---------- Init ----------
initAppwrite();
setLang(lang);
if (player){
  hideLogin();
  document.getElementById("userName").textContent = player.name;
  document.getElementById("userTeam").textContent = player.team;
  renderBingo();
  syncPull();
} else {
  showLogin();
}
</script>
</body>
</html>
