<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sommarbingo">
<meta name="theme-color" content="#22c55e">
<meta name="description" content="Sommarens träningsbingo för GBK U11-U13">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>Sommarbingo U11-U13</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17"></script>
<script src="./config.js?v=3"></script>
<style>
  :root{
    --bg:#0b1120; --surface:#1e293b; --surface2:#334155; --surface3:#475569;
    --text:#f8fafc; --muted:#94a3b8; --dim:#64748b;
    --green:#22c55e; --green-d:#16a34a; --green-l:#4ade80;
    --amber:#f59e0b; --amber-d:#d97706; --amber-l:#fbbf24;
    --red:#ef4444; --blue:#3b82f6;
    --radius:16px; --radius-sm:10px; --radius-lg:24px;
    --shadow:0 8px 32px rgba(0,0,0,.4); --shadow-sm:0 2px 8px rgba(0,0,0,.2);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; overscroll-behavior-y:none}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh;
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto; padding:calc(16px + var(--safe-top)) 16px calc(80px + var(--safe-bottom))}

  /* Header */
  .header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px}
  .header .title-block{flex:1; min-width:0}
  .header h1{margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
  .header h1 .emoji{font-size:24px}
  .header .sub{color:var(--muted); font-size:13px; margin-top:2px; font-weight:500}
  .lang-toggle{display:inline-flex; background:var(--surface); border-radius:999px; padding:3px; gap:2px; flex-shrink:0}
  .lang-toggle button{background:transparent; color:var(--muted); border:none; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; border-radius:999px; font-family:inherit; transition:all .2s}
  .lang-toggle button.active{background:var(--green); color:#052e16}

  /* Progress hero card */
  .hero{background:linear-gradient(135deg,#1e293b,#334155); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; box-shadow:var(--shadow); position:relative; overflow:hidden}
  .hero::before{content:""; position:absolute; top:-50%; right:-30%; width:200px; height:200px; background:radial-gradient(circle,rgba(34,197,94,.15),transparent 70%); pointer-events:none}
  .hero .pct-row{display:flex; align-items:baseline; gap:8px; margin-bottom:12px}
  .hero .pct{font-size:36px; font-weight:800; color:var(--green-l); font-variant-numeric:tabular-nums; line-height:1}
  .hero .pct-of{color:var(--muted); font-size:15px; font-weight:600}
  .hero .pct-label{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-left:auto}
  .hero .bar{height:10px; background:rgba(0,0,0,.3); border-radius:999px; overflow:hidden; margin-bottom:10px}
  .hero .bar > div{height:100%; background:linear-gradient(90deg,var(--green),var(--green-l)); border-radius:999px; transition:width .5s cubic-bezier(.4,0,.2,1); box-shadow:0 0 12px rgba(34,197,94,.5)}
  .hero .meta{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); font-weight:600}
  .hero .meta .styrke-count{color:var(--amber-l)}

  /* Prize banner */
  .prize{display:none; background:linear-gradient(135deg,#f59e0b,#fbbf24); color:#1e1308; border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; font-weight:700; font-size:14px; text-align:center; box-shadow:0 4px 20px rgba(245,158,11,.4)}
  .prize.show{display:block; animation:slideUp .4s}
  @keyframes slideUp{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:translateY(0)}}

  /* User bar */
  .user-bar{display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:var(--radius-sm); padding:10px 14px; margin-bottom:16px; font-size:13px}
  .user-bar .avatar{width:32px; height:32px; border-radius:50%; background:var(--green); color:#052e16; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex-shrink:0}
  .user-bar .info{flex:1; min-width:0}
  .user-bar .info .name{font-weight:700; color:var(--text)}
  .user-bar .info .team{color:var(--muted); font-size:12px}
  .user-bar .sync{font-size:11px; color:var(--muted); font-weight:600; flex-shrink:0}
  .user-bar .sync.ok{color:var(--green)}
  .user-bar .sync.err{color:var(--red)}
  .user-bar .logout{background:transparent; border:none; color:var(--muted); font-size:18px; padding:4px 8px; cursor:pointer; font-family:inherit}

  /* Styrke CTA button */
  .styrke-cta{display:flex; align-items:center; gap:14px; width:100%; background:linear-gradient(135deg,#78350f,#92400e); border:none; border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; cursor:pointer; font-family:inherit; text-align:left; box-shadow:0 4px 16px rgba(245,158,11,.25); transition:transform .1s}
  .styrke-cta:active{transform:scale(.98)}
  .styrke-cta .icon{font-size:28px; flex-shrink:0}
  .styrke-cta .text{flex:1; color:#fef3c7}
  .styrke-cta .text .t1{font-weight:800; font-size:15px; display:block}
  .styrke-cta .text .t2{font-size:12px; opacity:.8; display:block; margin-top:2px}
  .styrke-cta .arrow{color:#fbbf24; font-size:20px; flex-shrink:0}

  /* Bingo grid */
  .bingo{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .cell{
    background:var(--surface); border:2px solid transparent; border-radius:var(--radius-sm);
    padding:12px 10px; font-size:12px; line-height:1.3; min-height:110px;
    display:flex; flex-direction:column; cursor:pointer; transition:all .15s;
    user-select:none; position:relative; overflow:hidden;
  }
  .cell:active{transform:scale(.96)}
  .cell.done{background:linear-gradient(160deg,#14532d,#166534); border-color:var(--green); color:#dcfce7}
  .cell.done .check{opacity:1; transform:scale(1)}
  .cell .num{position:absolute; top:6px; left:8px; font-size:10px; color:var(--dim); font-weight:800; background:rgba(0,0,0,.3); padding:1px 6px; border-radius:999px}
  .cell.done .num{background:rgba(255,255,255,.15); color:#bbf7d0}
  .cell .txt{flex:1; padding-top:14px; font-weight:600}
  .cell .check{position:absolute; top:6px; right:8px; width:20px; height:20px; background:var(--green); color:#052e16; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; opacity:0; transform:scale(0); transition:all .25s cubic-bezier(.34,1.56,.64,1)}
  .cell.styrke{border-color:var(--amber); background:linear-gradient(160deg,#422006,#78350f)}
  .cell.styrke .txt{color:#fef3c7}
  .cell.styrke .badge{position:absolute; bottom:6px; right:8px; font-size:16px}
  .cell.styrke.done{background:linear-gradient(160deg,#14532d,#166534); border-color:var(--green)}
  .cell .note-badge{position:absolute; bottom:6px; left:8px; font-size:13px; opacity:.85}
  .cell .cell-date{position:absolute; bottom:5px; right:8px; font-size:9px; color:var(--dim); font-weight:600; font-variant-numeric:tabular-nums}
  .cell.done .cell-date{color:#bbf7d0; opacity:.7}
  .cell.styrke .cell-date{color:#fbbf24; opacity:.7}

  /* Login */
  .login-overlay{position:fixed; inset:0; background:linear-gradient(160deg,var(--bg),#1e293b); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px}
  .login-card{background:var(--surface); border-radius:var(--radius-lg); padding:28px 24px; max-width:360px; width:100%; box-shadow:var(--shadow)}
  .login-card .logo{text-align:center; font-size:48px; margin-bottom:8px}
  .login-card h2{margin:0 0 4px; text-align:center; font-size:22px; font-weight:800}
  .login-card .desc{color:var(--muted); font-size:13px; text-align:center; margin-bottom:20px; line-height:1.5}
  .login-card label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; font-weight:700; text-transform:uppercase; letter-spacing:.5px}
  .login-card input{width:100%; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:17px; font-family:inherit; transition:border-color .2s}
  .login-card input:focus{outline:none; border-color:var(--green)}
  .login-card .btn-primary{width:100%; margin-top:20px; padding:16px; font-size:16px; font-weight:800; background:var(--green); color:#052e16; border:none; border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; transition:transform .1s}
  .login-card .btn-primary:active{transform:scale(.98)}
  .login-card .status{font-size:12px; color:var(--red); text-align:center; margin-top:12px; min-height:16px}
  .login-card .lang-toggle{display:flex; justify-content:center; margin-bottom:16px}

  /* Modal */
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center; z-index:50; padding:0}
  .modal.show{display:flex; animation:fadeIn .2s}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-card{background:var(--bg); border-radius:var(--radius-lg) var(--radius-lg) 0 0; max-width:560px; width:100%; max-height:92vh; overflow-y:auto; padding:20px 16px calc(24px + var(--safe-bottom)); animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
  @keyframes slideUpModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-card{animation:slideUpModal .3s cubic-bezier(.4,0,.2,1)}
  .modal-card .grip{width:40px; height:4px; background:var(--surface2); border-radius:999px; margin:0 auto 16px}
  .modal-card h2{margin:0 0 4px; font-size:20px; font-weight:800; color:var(--amber-l); display:flex; align-items:center; gap:8px}
  .modal-card .desc{color:var(--muted); font-size:13px; margin-bottom:16px; line-height:1.5}

  /* Step list */
  .step-list{display:flex; flex-direction:column; gap:6px; margin-bottom:16px; max-height:240px; overflow-y:auto}
  .step-item{display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--surface); border-radius:var(--radius-sm); cursor:pointer; border:2px solid transparent; transition:all .15s}
  .step-item:active{transform:scale(.98)}
  .step-item.active{border-color:var(--amber); background:linear-gradient(135deg,#422006,#78350f)}
  .step-item.done{opacity:.5}
  .step-item.done .label{text-decoration:line-through}
  .step-item .idx{width:28px; height:28px; border-radius:50%; background:var(--surface2); color:var(--muted); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex-shrink:0}
  .step-item.active .idx{background:var(--amber); color:#1e1308}
  .step-item.done .idx{background:var(--green); color:#052e16}
  .step-item .label{flex:1; font-size:14px; font-weight:600}
  .step-item .stat{font-size:12px; color:var(--green-l); font-weight:700; flex-shrink:0}

  /* Active step */
  .active-step{background:var(--surface); border-radius:var(--radius); padding:20px 16px; margin-bottom:16px; text-align:center}
  .active-step h3{margin:0 0 6px; font-size:18px; font-weight:800}
  .active-step .hint{color:var(--muted); font-size:13px; margin-bottom:18px; line-height:1.5}
  .counter-display{font-size:64px; font-weight:900; color:var(--green-l); margin:12px 0; font-variant-numeric:tabular-nums; line-height:1}
  .counter-display .target{color:var(--muted); font-size:24px; font-weight:600}
  .counter-btns{display:flex; gap:12px; justify-content:center; margin:16px 0}
  .counter-btns button{width:64px; height:64px; font-size:28px; border-radius:50%; border:none; cursor:pointer; font-family:inherit; font-weight:800; transition:transform .1s}
  .counter-btns button:active{transform:scale(.9)}
  .counter-btns .minus{background:var(--surface2); color:var(--text)}
  .counter-btns .plus{background:var(--green); color:#052e16}
  .tap-area{background:linear-gradient(135deg,var(--surface2),var(--surface3)); border:2px dashed var(--green); border-radius:var(--radius); padding:28px 20px; text-align:center; cursor:pointer; margin:12px 0; font-size:14px; color:var(--muted); font-weight:600; transition:all .1s}
  .tap-area:active{background:var(--green); color:#052e16; transform:scale(.98); border-style:solid}

  .timer-display{font-size:72px; font-weight:900; text-align:center; font-variant-numeric:tabular-nums; margin:12px 0; color:var(--green-l); line-height:1}
  .timer-display.warn{color:var(--red); animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .timer-progress{height:8px; background:var(--surface2); border-radius:999px; overflow:hidden; margin:8px 0 18px}
  .timer-progress > div{height:100%; background:linear-gradient(90deg,var(--green),var(--green-l)); transition:width .3s linear}
  .set-label{color:var(--amber-l); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px}

  .nav-btns{display:flex; gap:8px; margin-top:16px}
  .nav-btns button{flex:1; padding:14px; font-size:14px; font-weight:700; border:none; border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; transition:transform .1s}
  .nav-btns button:active{transform:scale(.97)}
  .nav-btns .prev{background:var(--surface2); color:var(--text)}
  .nav-btns .skip{background:var(--amber); color:#1e1308}
  .nav-btns .next{background:var(--surface2); color:var(--text)}
  .complete-banner{display:none; background:linear-gradient(135deg,var(--green),var(--green-l)); color:#052e16; padding:16px; border-radius:var(--radius); font-weight:800; text-align:center; margin:12px 0; font-size:14px}
  .complete-banner.show{display:block; animation:slideUp .4s}
  .close-btn{width:100%; padding:14px; margin-top:12px; background:var(--surface2); color:var(--text); border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit}

  /* Edit modal inputs */
  .edit-textarea{width:100%; min-height:100px; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:16px; font-family:inherit; resize:vertical; line-height:1.5; box-sizing:border-box}
  .edit-textarea:focus{outline:none; border-color:var(--green)}
  .edit-date-input{width:100%; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:16px; font-family:inherit; box-sizing:border-box; color-scheme:dark}
  .edit-date-input:focus{outline:none; border-color:var(--green)}
  .today-btn{margin-top:10px; padding:10px 16px; background:var(--surface2); color:var(--text); border:none; border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px}
  .today-btn:active{background:var(--surface3)}

  /* Action menu rows */
  .action-row{display:flex; align-items:center; gap:14px; padding:16px; background:var(--surface2); border:none; border-radius:var(--radius-sm); color:var(--text); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; width:100%; text-align:left; margin-bottom:8px; transition:background .15s}
  .action-row:active{background:var(--surface3)}
  .action-row.danger{color:var(--red)}
  .action-row .action-icon{width:36px; height:36px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-shrink:0}
  .action-row.danger .action-icon{background:rgba(239,68,68,.15)}
  .action-row .action-icon svg{width:20px; height:20px}

  /* Reset button (subtle) */
  .reset-btn{display:block; margin:24px auto 0; background:transparent; border:none; color:var(--dim); font-size:12px; cursor:pointer; font-family:inherit; padding:8px 16px}
  .reset-btn:active{color:var(--red)}

  /* Mobile: desktop-layout is just normal flow */
  .desktop-layout{display:block}

  @media (min-width:600px) and (max-width:899px){
    .bingo{grid-template-columns:repeat(5,1fr)}
    .cell{min-height:120px}
  }

  /* Desktop layout: sidebar + main grid */
  @media (min-width:900px){
    .wrap{max-width:1100px; padding:32px 24px 48px}
    .header h1{font-size:28px}
    .header .sub{font-size:14px}

    .desktop-layout{display:grid; grid-template-columns:320px 1fr; gap:24px; align-items:start}
    .desktop-sidebar{position:sticky; top:24px}
    .desktop-main{min-width:0}

    .hero{margin-bottom:14px; padding:24px}
    .hero .pct{font-size:48px}
    .hero .pct-of{font-size:18px}
    .hero .bar{height:14px}

    .user-bar{margin-bottom:14px; padding:14px 18px}
    .styrke-cta{margin-bottom:0}

    .bingo{grid-template-columns:repeat(6,1fr); gap:10px}
    .cell{min-height:130px; padding:14px 12px; font-size:13px}
    .cell .num{font-size:11px; padding:2px 8px}
    .cell .check{width:24px; height:24px; font-size:14px}
    .cell .badge{font-size:20px}

    .modal{align-items:center; padding:20px}
    .modal-card{max-width:640px; max-height:88vh; border-radius:var(--radius-lg)}
    .modal-card .grip{display:none}

    .login-card{max-width:420px; padding:36px 32px}
    .login-card .logo{font-size:56px}
    .login-card h2{font-size:26px}

    .counter-display{font-size:80px}
    .counter-btns button{width:72px; height:72px; font-size:32px}
    .timer-display{font-size:88px}
    .tap-area{padding:36px 24px; font-size:16px}

    .reset-btn{font-size:13px; margin-top:32px}
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="logo">🎯</div>
    <h2 id="loginTitle">Sommarbingo</h2>
    <div class="lang-toggle">
      <button id="langSvLogin" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEnLogin" onclick="setLang('en')">EN</button>
    </div>
    <div class="desc" id="loginDesc"></div>
    <label for="loginName" id="lblName"></label>
    <input id="loginName" type="text" placeholder="Ella" autocomplete="off" autocapitalize="words">
    <label for="loginTeam" id="lblTeam"></label>
    <input id="loginTeam" type="text" placeholder="GBK" autocomplete="off" autocapitalize="characters">
    <button class="btn-primary" id="loginBtn"></button>
    <div class="status" id="loginStatus"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <div class="header">
    <div class="title-block">
      <h1><span class="emoji">🎯</span><span id="hTitle"></span></h1>
      <div class="sub" id="hSub"></div>
    </div>
    <div class="lang-toggle">
      <button id="langSv" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="desktop-layout">
    <div class="desktop-sidebar">
      <div class="hero">
        <div class="pct-row">
          <span class="pct" id="heroPct">0%</span>
          <span class="pct-of" id="heroOf">0/30</span>
          <span class="pct-label" id="heroLabel"></span>
        </div>
        <div class="bar"><div id="progBar" style="width:0%"></div></div>
        <div class="meta">
          <span id="heroBingo"></span>
          <span class="styrke-count" id="heroStyrke"></span>
        </div>
      </div>

      <div class="prize" id="prize"></div>

      <div class="user-bar">
        <div class="avatar" id="userAvatar"></div>
        <div class="info">
          <div class="name" id="userName"></div>
          <div class="team" id="userTeam"></div>
        </div>
        <span class="sync" id="syncStatus">⟳</span>
        <button class="logout" id="logoutBtn" title="Switch player">⎋</button>
      </div>

      <button class="styrke-cta" id="openStyrke">
        <span class="icon">💪</span>
        <span class="text">
          <span class="t1" id="styrkeCtaT1"></span>
          <span class="t2" id="styrkeCtaT2"></span>
        </span>
        <span class="arrow">›</span>
      </button>
    </div>

    <div class="desktop-main">
      <div class="bingo" id="bingo"></div>
      <button class="reset-btn" id="resetBtn"></button>
    </div>
  </div>
</div>

<div class="modal" id="styrkeModal">
  <div class="modal-card">
    <div class="grip"></div>
    <h2>💪 <span id="styrkeTitle"></span></h2>
    <div class="desc" id="styrkeDesc"></div>
    <div class="step-list" id="stepList"></div>
    <div class="active-step" id="activeStep">
      <h3 id="asTitle"></h3>
      <div class="hint" id="asHint"></div>
      <div id="asBody"></div>
    </div>
    <div class="complete-banner" id="styrkeDone"></div>
    <div class="nav-btns">
      <button class="prev" id="prevBtn"></button>
      <button class="skip" id="skipBtn"></button>
      <button class="next" id="nextBtn"></button>

// ---------- Appwrite ----------
function initAppwrite(){
  if (window.APPWRITE_PROJECT_ID && window.APPWRITE_PROJECT_ID !== "YOUR_PROJECT_ID" && window.Appwrite){
    try {
      const client = new window.Appwrite.Client()
        .setEndpoint(window.APPWRITE_ENDPOINT)
        .setProject(window.APPWRITE_PROJECT_ID);
      awDatabases = new window.Appwrite.Databases(client);
    } catch(e){ console.warn("Appwrite init failed", e); }
  }
}

function setSync(status, msg){
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.className = "sync " + (status || "");
  el.textContent = msg || (status === "ok" ? t("syncSaved") : status === "err" ? t("syncOffline") : "⟳");
}

function rowId(){
  return (player.name + "_" + player.team).toLowerCase().replace(/[^a-z0-9._-]/g, "_").slice(0, 36);
}

async function syncPush(){
  if (!awDatabases || !player) return;
  setSync("", t("syncSaving"));
  try {
    const payload = {
      player_name: player.name, team_code: player.team,
      bingo: JSON.stringify(bingoState), styrke: JSON.stringify(styrkeState),
      notes: JSON.stringify(mergeNotesAndDates(notesState, datesState)),
      updated_at: new Date().toISOString()
    };
    try {
      await awDatabases.updateDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId(), payload);
    } catch(updateErr){
      if (updateErr.code === 404 || (updateErr.message || "").includes("not found")){
        await awDatabases.createDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId(), payload);
      } else { throw updateErr; }
    }
    setSync("ok", t("syncSaved"));
  } catch(e){ console.warn(e); setSync("err", t("syncOffline")); }
}

async function syncPull(){
  if (!awDatabases || !player) return;
  try {
    const doc = await awDatabases.getDocument(window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID, rowId());
    if (doc){
      bingoState = safeParse(doc.bingo, []);
      styrkeState = safeParse(doc.styrke, []);
      const merged = safeParse(doc.notes, {});
      const split = splitNotesAndDates(merged);
      notesState = split.notes;
      datesState = split.dates;
      localStorage.setItem(KEY_BINGO, JSON.stringify(bingoState));
      localStorage.setItem(KEY_STYRKE, JSON.stringify(styrkeState));
      localStorage.setItem(KEY_NOTES, JSON.stringify(notesState));
      localStorage.setItem(KEY_DATES, JSON.stringify(datesState));
      renderBingo();
      setSync("ok", t("syncSynced"));
    }
  } catch(e){
    if (e.code !== 404){ console.warn(e); setSync("err", t("syncLoadFail")); }
    else { setSync("ok", t("syncNewPlayer")); }
  }
}

function safeParse(s, fallback){ try { return JSON.parse(s) || fallback; } catch(e){ return fallback; } }

// ---------- Bingo ----------
function saveBingo(){ localStorage.setItem(KEY_BINGO, JSON.stringify(bingoState)); scheduleSync(); }
function saveStyrke(){ localStorage.setItem(KEY_STYRKE, JSON.stringify(styrkeState)); scheduleSync(); }
function saveNotes(){ localStorage.setItem(KEY_NOTES, JSON.stringify(notesState)); scheduleSync(); }
function saveDates(){ localStorage.setItem(KEY_DATES, JSON.stringify(datesState)); scheduleSync(); }
function scheduleSync(){ if (syncTimer) clearTimeout(syncTimer); syncTimer = setTimeout(syncPush, 800); }

// Dates are stored in the same cloud `notes` field with "date:" prefix keys
// to avoid needing a new Appwrite column (collection is at attribute limit).
function mergeNotesAndDates(notes, dates){
  const merged = {};
  Object.keys(notes).forEach(k => { merged[k] = notes[k]; });
  Object.keys(dates).forEach(k => { merged["date:" + k] = dates[k]; });
  return merged;
}
function splitNotesAndDates(merged){
  const notes = {}, dates = {};
  Object.keys(merged).forEach(k => {
    if (k.startsWith("date:")){ dates[k.slice(5)] = merged[k]; }
    else { notes[k] = merged[k]; }
  });
  return { notes, dates };
}

function renderBingo(){
  const grid = document.getElementById("bingo");
  if (!grid) return;
  grid.innerHTML = "";
  BINGO.forEach((row, r) => row.forEach((cell, c) => {
    const idx = r*6 + c;
    const isStyrke = cell === "STYRKE";
    const label = isStyrke ? t("styrkeCellLabel") : cell[lang];
    const done = bingoState.includes(idx);
    const hasNote = !!(notesState[idx] && notesState[idx].trim());
    const dateStr = datesState[idx] || "";
    const el = document.createElement("div");
    el.className = "cell" + (done ? " done" : "") + (isStyrke ? " styrke" : "");
    el.innerHTML = `<span class="num">${idx+1}</span><span class="check">✓</span>${isStyrke?'<span class="badge">💪</span>':''}${hasNote?'<span class="note-badge">📝</span>':''}<div class="txt">${label}</div>${dateStr?`<div class="cell-date">${dateStr}</div>`:''}`;
    el.onclick = () => {
      if (isStyrke){ openStyrke(); return; }
      toggleBingo(idx);
    };
    // Long-press: open action menu
    let pressTimer = null;
    const startPress = () => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        openCellActions(idx, label, isStyrke);
      }, 600);
    };
    const cancelPress = () => { if (pressTimer){ clearTimeout(pressTimer); pressTimer = null; } };
    el.addEventListener("touchstart", startPress, {passive:true});
    el.addEventListener("touchend", cancelPress);
    el.addEventListener("touchcancel", cancelPress);
    el.addEventListener("mousedown", startPress);
    el.addEventListener("mouseup", cancelPress);
    el.addEventListener("mouseleave", cancelPress);
    grid.appendChild(el);
  }));
  updateProgress();
}

  unmark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
  note: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>',
  date: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
};

function openCellActions(idx, label, isStyrke){
  const modal = document.getElementById("actionModal");
  const title = document.getElementById("actionModalTitle");
  const sub = document.getElementById("actionModalSub");
  const body = document.getElementById("actionModalBody");
  const cancelBtn = document.getElementById("actionModalCancel");

  title.textContent = `#${idx+1}`;
  sub.textContent = label;

  const actions = [];
  if (isStyrke && bingoState.includes(idx)){
    actions.push({ icon: ICONS.unmark, label: t("menuUnmark"), danger: true, fn: () => { setBingoDone(idx, false); renderBingo(); scheduleSync(); closeActionModal(); } });
  }
  actions.push({ icon: ICONS.note, label: t("menuNote"), fn: () => { closeActionModal(); setTimeout(() => editNote(idx, label), 200); } });
  actions.push({ icon: ICONS.date, label: t("menuDate"), fn: () => { closeActionModal(); setTimeout(() => editDate(idx, label), 200); } });

  body.innerHTML = actions.map((a, i) =>
    `<button class="action-row ${a.danger?'danger':''}" data-i="${i}"><span class="action-icon">${a.icon}</span><span>${a.label}</span></button>`
  ).join("");
  body.querySelectorAll(".action-row").forEach((btn, i) => { btn.onclick = actions[i].fn; });

  cancelBtn.textContent = t("btnCancel");
  cancelBtn.onclick = closeActionModal;
  modal.classList.add("show");
}

function closeActionModal(){
  document.getElementById("actionModal").classList.remove("show");
}

function editNote(idx, label){
  const modal = document.getElementById("editModal");
  const title = document.getElementById("editModalTitle");
  const sub = document.getElementById("editModalSub");
  const body = document.getElementById("editModalBody");
  const saveBtn = document.getElementById("editModalSave");
  const cancelBtn = document.getElementById("editModalCancel");
  const closeBtn = document.getElementById("editModalClose");

  title.textContent = t("editNoteTitle");
  sub.textContent = `#${idx+1} · ${label}`;
  const current = notesState[idx] || "";
  body.innerHTML = `<textarea class="edit-textarea" id="noteInput" placeholder="${t("editNotePlaceholder")}">${escapeHtmlSimple(current)}</textarea>`;
  const input = document.getElementById("noteInput");
  setTimeout(() => input.focus(), 100);

  const save = () => {
    const val = input.value.trim();
    if (val){ notesState[idx] = val; } else { delete notesState[idx]; }
    saveNotes(); renderBingo(); closeEditModal();
  };
  saveBtn.textContent = t("btnSave");
  saveBtn.onclick = save;
  cancelBtn.textContent = t("btnCancel");
  cancelBtn.onclick = closeEditModal;
  closeBtn.onclick = closeEditModal;
  modal.classList.add("show");
}

function editDate(idx, label){
  const modal = document.getElementById("editModal");
  const title = document.getElementById("editModalTitle");
  const sub = document.getElementById("editModalSub");
  const body = document.getElementById("editModalBody");
  const saveBtn = document.getElementById("editModalSave");
  const cancelBtn = document.getElementById("editModalCancel");
  const closeBtn = document.getElementById("editModalClose");

  title.textContent = t("editDateTitle");
  sub.textContent = `#${idx+1} · ${label}`;
  const current = datesState[idx] || todayStr();
  body.innerHTML = `<input type="date" class="edit-date-input" id="dateInput" value="${current}"><button class="today-btn" id="todayBtn">📅 ${t("today")}</button>`;
  const input = document.getElementById("dateInput");
  const todayBtn = document.getElementById("todayBtn");
  todayBtn.onclick = () => { input.value = todayStr(); };

  const save = () => {
    const val = input.value.trim();
    if (val){ datesState[idx] = val; } else { delete datesState[idx]; }
    saveDates(); renderBingo(); closeEditModal();
  };
  saveBtn.textContent = t("btnSave");
  saveBtn.onclick = save;
  cancelBtn.textContent = t("btnCancel");
  cancelBtn.onclick = closeEditModal;
  closeBtn.onclick = closeEditModal;
  modal.classList.add("show");
}

function closeEditModal(){
  document.getElementById("editModal").classList.remove("show");
}

function escapeHtmlSimple(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleBingo(idx){
  const i = bingoState.indexOf(idx);
  if (i >= 0){
    bingoState.splice(i,1);
    delete datesState[idx];
  } else {
    bingoState.push(idx);
    datesState[idx] = todayStr();
  }
  saveBingo(); saveDates(); renderBingo();
}

function setBingoDone(idx, done){
  const i = bingoState.indexOf(idx);
  if (done && i < 0){ bingoState.push(idx); datesState[idx] = todayStr(); }
  if (!done && i >= 0){ bingoState.splice(i,1); delete datesState[idx]; }
  saveBingo(); saveDates();
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function updateProgress(){
  const total = 30;
  const n = bingoState.length;
  const pct = Math.min(100, Math.round(n/total*100));
  const styrkeCells = [];
  BINGO.forEach((row, r) => row.forEach((cell, c) => { if (cell === "STYRKE") styrkeCells.push(r*6 + c); }));
  const styrkeDone = styrkeCells.filter(idx => bingoState.includes(idx)).length;
  document.getElementById("progBar").style.width = pct + "%";
  document.getElementById("heroPct").textContent = pct + "%";
  document.getElementById("heroOf").textContent = `${n}/${total}`;
  document.getElementById("heroBingo").textContent = t("heroBingo")(n);
  document.getElementById("heroStyrke").textContent = t("heroStyrke")(styrkeDone);
  document.getElementById("prize").classList.toggle("show", n === total);
}

// ---------- Styrke ----------
function openStyrke(){
  document.getElementById("styrkeModal").classList.add("show");
  renderStepList();
  showStep(currentStep);
}
function closeStyrke(){
  document.getElementById("styrkeModal").classList.remove("show");
  stopTimer();
}

function renderStepList(){
  const list = document.getElementById("stepList");
  list.innerHTML = "";
  STYRKE.forEach((s, i) => {
    const st = styrkeState[i] || {done:false};
    const el = document.createElement("div");
    el.className = "step-item" + (i === currentStep ? " active" : "") + (st.done ? " done" : "");
    const stat = st.done ? "✓" : (s.type === "reps" ? `${st.count||0}/${s.target}` : s.type === "timer" ? `${st.elapsed||0}s` : "");
    el.innerHTML = `<span class="idx">${i+1}</span><span class="label">${s.t[lang]}</span><span class="stat">${stat}</span>`;
    el.onclick = () => { stopTimer(); currentStep = i; renderStepList(); showStep(i); };
    list.appendChild(el);
  });
}

function showStep(i){
  currentStep = i;
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false};
  document.getElementById("asTitle").textContent = `${i+1}. ${s.t[lang]}`;
  document.getElementById("asHint").textContent = s.hint[lang] || "";
  const body = document.getElementById("asBody");
  body.innerHTML = "";

  if (s.type === "info"){
    body.innerHTML = `<div class="tap-area" id="infoDone">${t("infoDone")}</div>`;
    document.getElementById("infoDone").onclick = () => markStyrkeDone(i);
  } else if (s.type === "reps"){
    const count = st.count || 0;
    body.innerHTML = `
      <div class="counter-display"><span id="repCount">${count}</span><span class="target">/${s.target}</span></div>
      <div class="counter-btns">
        <button class="minus" id="repMinus">−</button>
        <button class="plus" id="repPlus">+</button>
      </div>
      <div class="tap-area" id="repTap">${t("repTap")}</div>
    `;
    document.getElementById("repMinus").onclick = () => updateRep(i, -1);
    document.getElementById("repPlus").onclick = () => updateRep(i, +1);
    document.getElementById("repTap").onclick = () => updateRep(i, +1);
  } else if (s.type === "timer"){
    const sets = s.sets || 1;
    const curSet = (st.setIdx || 0) + 1;
    const elapsed = st.elapsed || 0;
    const remaining = s.target - elapsed;
    body.innerHTML = `
      ${sets > 1 ? `<div class="set-label">${t("setLabel")(curSet, sets)}</div>` : ""}
      <div class="timer-display" id="timerDisp">${fmtTime(remaining)}</div>
      <div class="timer-progress"><div id="timerProg" style="width:${(elapsed/s.target)*100}%"></div></div>
      <div class="counter-btns">
        <button class="plus" id="timerStart">${t("timerStart")}</button>
        <button class="minus" id="timerPause">${t("timerPause")}</button>
        <button class="minus" id="timerReset">${t("timerReset")}</button>
      </div>
    `;
    document.getElementById("timerStart").onclick = () => startTimer(i);
    document.getElementById("timerPause").onclick = () => stopTimer();
    document.getElementById("timerReset").onclick = () => resetTimer(i);
  }
  renderStepList();
  checkAllStyrkeDone();
}

function updateRep(i, delta){
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false, count:0};
  st.count = Math.max(0, Math.min(s.target, (st.count||0) + delta));
  st.done = st.count >= s.target;
  styrkeState[i] = st;
  saveStyrke();
  if (st.done){ markStyrkeDone(i, false); } else { showStep(i); }
}

function startTimer(i){
  stopTimer();
  const s = STYRKE[i];
  const st = styrkeState[i] || {done:false, elapsed:0, setIdx:0};
  styrkeState[i] = st;
  timerHandle = setInterval(() => {
    st.elapsed = (st.elapsed || 0) + 1;
    const disp = document.getElementById("timerDisp");
    const prog = document.getElementById("timerProg");
    const remaining = s.target - st.elapsed;
    if (disp) {
      disp.textContent = fmtTime(Math.max(0, remaining));
      disp.classList.toggle("warn", remaining <= 5 && remaining > 0);
    }
    if (prog) prog.style.width = (st.elapsed/s.target)*100 + "%";
    if (st.elapsed >= s.target){
      stopTimer();
      const sets = s.sets || 1;
      if ((st.setIdx || 0) + 1 < sets){
        st.setIdx = (st.setIdx || 0) + 1;
        st.elapsed = 0;
        saveStyrke();
        showStep(i);
      } else {
        st.done = true;
        saveStyrke();
        markStyrkeDone(i, false);
      }
    }
    saveStyrke();
    renderStepList();
  }, 1000);
}
function stopTimer(){ if (timerHandle){ clearInterval(timerHandle); timerHandle = null; } }
function resetTimer(i){
  stopTimer();
  const st = styrkeState[i] || {};
  st.elapsed = 0; st.setIdx = 0; st.done = false;
  styrkeState[i] = st;
  saveStyrke();
  showStep(i);
}

function markStyrkeDone(i, silent){
  const st = styrkeState[i] || {done:false};
  st.done = true;
  styrkeState[i] = st;
  saveStyrke();
  stopTimer();
  if (!silent) showStep(i);
  checkAllStyrkeDone();
  renderStepList();
}

function checkAllStyrkeDone(){
  const allDone = STYRKE.every((_, i) => (styrkeState[i] || {}).done);
  document.getElementById("styrkeDone").classList.toggle("show", allDone);
  if (allDone){
    const styrkeCells = [];
    BINGO.forEach((row, r) => row.forEach((cell, c) => {
      if (cell === "STYRKE") styrkeCells.push(r*6 + c);
    }));
    const nextCell = styrkeCells.find(idx => !bingoState.includes(idx));
    if (nextCell !== undefined){
      setBingoDone(nextCell, true);
      renderBingo();
      styrkeState = STYRKE.map(() => ({done:false}));
      saveStyrke();
      currentStep = 0;
      renderStepList();
      showStep(0);
    }
  }
}

function fmtTime(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

// ---------- Wire up ----------
document.getElementById("prevBtn").onclick = () => { stopTimer(); if (currentStep > 0){ currentStep--; showStep(currentStep); } };
document.getElementById("nextBtn").onclick = () => { stopTimer(); if (currentStep < STYRKE.length - 1){ currentStep++; showStep(currentStep); } };
document.getElementById("skipBtn").onclick = () => { stopTimer(); if (currentStep < STYRKE.length - 1){ currentStep++; showStep(currentStep); } };
document.getElementById("openStyrke").onclick = openStyrke;
document.getElementById("closeStyrke").onclick = closeStyrke;
document.getElementById("styrkeModal").onclick = (e) => { if (e.target.id === "styrkeModal") closeStyrke(); };
document.getElementById("editModal").onclick = (e) => { if (e.target.id === "editModal") closeEditModal(); };
document.getElementById("actionModal").onclick = (e) => { if (e.target.id === "actionModal") closeActionModal(); };
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("logoutBtn").onclick = doLogout;
document.getElementById("resetBtn").onclick = () => {
  if (confirm(t("resetConfirm"))){
    bingoState = []; styrkeState = []; notesState = {}; datesState = {}; currentStep = 0;
    saveBingo(); saveStyrke(); saveNotes(); saveDates();
    renderBingo();
    document.getElementById("styrkeDone").classList.remove("show");
    syncPush();
  }
};
document.getElementById("loginTeam").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
document.getElementById("loginName").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("loginTeam").focus(); });

// ---------- Init ----------
initAppwrite();
setLang(lang);
if (player){
  hideLogin();
  document.getElementById("userName").textContent = player.name;
  document.getElementById("userTeam").textContent = player.team;
  document.getElementById("userAvatar").textContent = player.name.charAt(0).toUpperCase();
  renderBingo();
  syncPull();
} else {
  showLogin();
}

// ---------- PWA Service Worker ----------
if ("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(e => console.warn("SW registration failed", e));
  });
}
</script>
