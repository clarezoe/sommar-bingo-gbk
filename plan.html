<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spelare">
<meta name="theme-color" content="#22c55e">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>Spelare — Sommarbingo</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17"></script>
<script src="./config.js?v=3"></script>
<style>
  :root{
    --bg:#0b1120; --surface:#1e293b; --surface2:#334155; --surface3:#475569;
    --text:#f8fafc; --muted:#94a3b8; --dim:#64748b;
    --green:#22c55e; --green-l:#4ade80;
    --amber:#f59e0b; --amber-l:#fbbf24;
    --red:#ef4444;
    --radius:16px; --radius-sm:10px; --radius-lg:24px;
    --shadow:0 8px 32px rgba(0,0,0,.4);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px; margin:0 auto; padding:calc(16px + var(--safe-top)) 16px calc(40px + var(--safe-bottom))}
  .header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px}
  .header h1{margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
  .header .sub{color:var(--muted); font-size:13px; margin-top:2px; font-weight:500}
  .lang-toggle{display:inline-flex; background:var(--surface); border-radius:999px; padding:3px; gap:2px; flex-shrink:0}
  .lang-toggle button{background:transparent; color:var(--muted); border:none; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; border-radius:999px; font-family:inherit}
  .lang-toggle button.active{background:var(--green); color:#052e16}

  .card{background:var(--surface); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow)}
  .card label{display:block; font-size:12px; color:var(--muted); margin:0 0 8px; font-weight:700; text-transform:uppercase; letter-spacing:.5px}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap}
  .toolbar input{flex:1; min-width:120px; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:17px; font-family:inherit}
  .toolbar input:focus{outline:none; border-color:var(--green)}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius-sm); padding:14px 18px; font-size:14px; font-weight:700; transition:transform .1s}
  button:active{transform:scale(.97)}
  .btn-primary{background:var(--green); color:#052e16}
  .btn-secondary{background:var(--surface2); color:var(--text)}
  .status{font-size:12px; color:var(--muted); margin-top:10px; font-weight:600}
  .status.err{color:var(--red)}
  .status.ok{color:var(--green)}

  .players-header{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:14px}
  .players-header h3{margin:0; font-size:17px; font-weight:800}
  .players-header .updated{color:var(--muted); font-size:11px; font-weight:600}

  .player-row{background:var(--surface); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; box-shadow:var(--shadow)}
  .player-row .summary{display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer}
  .player-row .summary:active{background:var(--surface2)}
  .player-row .avatar{width:40px; height:40px; border-radius:50%; background:var(--green); color:#052e16; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; flex-shrink:0}
  .player-row .info{flex:1; min-width:0}
  .player-row .info .name{font-weight:800; font-size:15px}
  .player-row .info .stats{color:var(--muted); font-size:12px; margin-top:2px; display:flex; gap:12px; flex-wrap:wrap}
  .player-row .info .stats .bingo-stat{color:var(--green-l)}
  .player-row .info .stats .styrke-stat{color:var(--amber-l)}
  .player-row .pct-circle{width:44px; height:44px; flex-shrink:0; position:relative}
  .player-row .pct-circle svg{transform:rotate(-90deg)}
  .player-row .pct-circle .pct-text{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:var(--green-l)}

  .player-row .detail{display:none; padding:0 16px 16px; border-top:1px solid var(--surface2)}
  .player-row.expanded .detail{display:block}
  .detail-section{margin-top:14px}
  .detail-section .label{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px}
  .mini-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:4px; max-width:100%}
  .styrke-chips{display:flex; flex-wrap:wrap; gap:5px}
  .styrke-chip{font-size:11px; padding:4px 8px; border-radius:6px; background:var(--surface2); color:var(--text); font-weight:600}
  .styrke-chip.done{background:var(--green); color:#052e16}
  .styrke-chip .stat{font-weight:800; margin-left:4px}

  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px}

  /* Desktop */
  @media (min-width:900px){
    .wrap{max-width:900px; padding:32px 24px 48px}
    .header h1{font-size:28px}
    .header .sub{font-size:14px}
    .player-row .summary{padding:18px 20px}
    .player-row .avatar{width:48px; height:48px; font-size:18px}
    .player-row .info .name{font-size:17px}
    .player-row .info .stats{font-size:13px}
    .player-row .pct-circle{width:52px; height:52px}
    .player-row .pct-circle .pct-text{font-size:13px}
    .mini-grid{grid-template-columns:repeat(10,1fr); gap:6px}
    .mini-cell{font-size:11px}
    .login-card{max-width:420px !important; padding:36px 32px !important}
  }

  /* Modal */
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:flex-end; justify-content:center; z-index:200; padding:0}
  .modal.show{display:flex; animation:fadeIn .2s}
  .modal-card{background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:20px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; box-shadow:0 -4px 24px rgba(0,0,0,.4); animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
  .grip{width:40px; height:4px; background:var(--surface3); border-radius:2px; margin:0 auto 16px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media (min-width:900px){
    .modal{align-items:center; padding:20px}
    .modal-card{border-radius:var(--radius-lg); max-width:480px; max-height:88vh}
    .grip{display:none}
  }

  /* Mini-grid with inline date + clickable notes */
  .mini-cell{position:relative; aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; background:var(--surface2); font-size:13px; font-weight:700; color:var(--muted); border:1px solid transparent}
  .mini-cell.done{background:var(--green); color:#052e16; border-color:var(--green)}
  .mini-cell.styrke{background:var(--amber); color:#1e1308; border-color:var(--amber)}
  .mini-cell.has-note{box-shadow:0 0 0 2px var(--amber) inset}
  .mini-cell.clickable{cursor:pointer}
  .mini-cell.clickable:active{transform:scale(.95)}
  .mini-num{font-size:13px; font-weight:800}
  .mini-note{position:absolute; top:2px; right:3px; font-size:10px}
  .mini-date{position:absolute; bottom:1px; left:0; right:0; text-align:center; font-size:8px; opacity:.75; font-weight:600}
  .mini-cell.done .mini-date{color:#052e16}

  /* Cell detail rows */
  .cell-detail-row{display:flex; gap:10px; padding:12px; background:var(--surface2); border-radius:8px; margin-bottom:8px; align-items:flex-start}
  .cell-detail-label{font-size:18px; flex-shrink:0}
  .cell-detail-val{font-size:14px; color:var(--text); line-height:1.5; word-break:break-word}
  .cell-detail-val.note-val{white-space:pre-wrap}
</style>
</head>
<body>

<div class="login-overlay" id="coachLogin" style="position:fixed;inset:0;background:linear-gradient(160deg,var(--bg),#1e293b);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px">
  <div class="login-card" style="background:var(--surface);border-radius:var(--radius-lg);padding:28px 24px;max-width:360px;width:100%;box-shadow:var(--shadow)">
    <div style="text-align:center;font-size:48px;margin-bottom:8px">🔒</div>
    <h2 style="margin:0 0 4px;text-align:center;font-size:22px;font-weight:800" id="coachLoginTitle"></h2>
    <div style="color:var(--muted);font-size:13px;text-align:center;margin-bottom:20px;line-height:1.5" id="coachLoginDesc"></div>
    <label style="display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px" id="lblCoachPw"></label>
    <div style="position:relative">
      <input id="coachPw" type="password" placeholder="••••••" autocomplete="off" style="width:100%;padding:14px 44px 14px 16px;border-radius:var(--radius-sm);border:2px solid var(--surface2);background:var(--bg);color:var(--text);font-size:17px;font-family:inherit">
      <button type="button" id="pwToggle" aria-label="Show password" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--muted);padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <svg id="pwEyeOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="pwEyeClosed" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <button class="btn-primary" id="coachPwBtn" style="width:100%;margin-top:20px;padding:16px;font-size:16px;font-weight:800;background:var(--green);color:#052e16;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit"></button>
    <div class="status" id="coachPwStatus" style="font-size:12px;color:var(--red);text-align:center;margin-top:12px;min-height:16px"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <div class="header">
    <div>
      <h1>📋 <span id="hTitle"></span></h1>
      <div class="sub" id="hSub"></div>
    </div>
    <div class="lang-toggle">
      <button id="langSv" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="nav-links" style="display:flex;gap:8px;margin-bottom:16px">
    <a href="./plan.html" class="active" style="flex:1;text-align:center;padding:12px;border-radius:var(--radius-sm);background:var(--green);color:#052e16;text-decoration:none;font-size:13px;font-weight:700">👥 <span id="navPlayers">Spelare</span></a>
    <a href="./coach.html" style="flex:1;text-align:center;padding:12px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);text-decoration:none;font-size:13px;font-weight:700">📋 <span id="navPlans">Planer</span></a>
  </div>

  <div class="card">
    <label for="teamCode" id="lblTeam"></label>
    <div class="toolbar">
      <input id="teamCode" type="text" placeholder="GBK" autocomplete="off" autocapitalize="characters">
      <button class="btn-primary" id="loadBtn"></button>
      <button class="btn-secondary" id="refreshBtn">↻</button>
    </div>
    <div id="planSelectorWrap" style="display:none;margin-top:12px">
      <label id="lblPlan" style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px"></label>
      <select id="planSelect" style="width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:2px solid var(--surface2);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit"></select>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div id="playersCard" style="display:none">
    <div class="players-header">
      <h3><span id="lblPlayersIn"></span> <span id="teamLabel"></span></h3>
      <span class="updated" id="lastLoad"></span>
    </div>
    <div id="playersList"></div>
  </div>
</div>

<div class="modal" id="cellDetailModal">
  <div class="modal-card">
    <div class="grip"></div>
    <h2 id="cellDetailTitle" style="color:var(--text);font-size:16px;font-weight:800;margin:0 0 4px"></h2>
    <div id="cellDetailSub" style="color:var(--muted);font-size:12px;margin-bottom:16px"></div>
    <div id="cellDetailBody"></div>
    <button onclick="closeCellDetail()" style="width:100%;margin-top:16px;padding:14px;font-size:14px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit">OK</button>
  </div>
</div>

<script>
let awDatabases = null;
let currentTeam = "";
let lang = localStorage.getItem("sommarbingo.lang") || "sv";

const I18N = {
  sv: {
    hTitle: "Coach", hSub: "Sommarbingo U11-U13 · se alla spelares framsteg",
    lblTeam: "Lagkod", loadBtn: "Ladda", lblPlayersIn: "Spelare i",
    empty: "Inga spelare har registrerat sig för detta lagkod än.",
    loading: "Laddar...", enterTeam: "Ange lagkod.", notConfigured: "Appwrite inte konfigurerad.",
    loadFail: m => "Kunde inte ladda: " + m, playersCount: n => `${n} spelare`,
    updatedPrefix: "Uppdaterad ",
    styrkeLabel: "Styrkegymnastik:", detailTap: "Tryck för att visa/dölja detaljer",
    navPlayers: "Spelare", navPlans: "Planer",
    lblPlan: "Välj plan", allPlans: "Alla planer", legacyPlan: "Äldre (utan plan)",
    coachLoginTitle: "Coach-inloggning", coachLoginDesc: "Ange lösenord för att se spelarnas framsteg.",
    lblCoachPw: "Lösenord", coachPwBtn: "Logga in", coachPwWrong: "Fel lösenord.",
    notesLabel: "Anteckningar:",
    datesLabel: "Datum:",
    noNote: "Ingen anteckning.",
    bingoLabel: "Bingo-bricka (grön=klar, gul=styrke, 📝=anteckning — tryck för att läsa):",
  },
  en: {
    hTitle: "Coach", hSub: "Summer Bingo U11-U13 · see all players' progress",
    lblTeam: "Team code", loadBtn: "Load", lblPlayersIn: "Players in",
    empty: "No players have registered for this team code yet.",
    loading: "Loading...", enterTeam: "Enter team code.", notConfigured: "Appwrite not configured.",
    loadFail: m => "Could not load: " + m, playersCount: n => `${n} players`,
    updatedPrefix: "Updated ",
    styrkeLabel: "Strength program:", detailTap: "Tap to show/hide details",
    navPlayers: "Players", navPlans: "Plans",
    lblPlan: "Select plan", allPlans: "All plans", legacyPlan: "Legacy (no plan)",
    coachLoginTitle: "Coach login", coachLoginDesc: "Enter password to view players' progress.",
    lblCoachPw: "Password", coachPwBtn: "Log in", coachPwWrong: "Wrong password.",
    notesLabel: "Notes:",
    datesLabel: "Dates:",
    noNote: "No note.",
    bingoLabel: "Bingo board (green=done, yellow=strength, 📝=note — tap to read):",
  }
};
function t(key){ const v = I18N[lang][key]; return typeof v === "function" ? v : v; }

function setLang(l){
  lang = l; localStorage.setItem("sommarbingo.lang", l); document.documentElement.lang = l;
  document.getElementById("langSv").classList.toggle("active", l === "sv");
  document.getElementById("langEn").classList.toggle("active", l === "en");
  applyTexts();
  if (currentTeam) renderPlayers(lastPlayers);
}

let lastPlayers = [];

function applyTexts(){
  document.getElementById("hTitle").textContent = t("hTitle");
  document.getElementById("hSub").textContent = t("hSub");
  document.getElementById("lblTeam").textContent = t("lblTeam");
  document.getElementById("loadBtn").textContent = t("loadBtn");
  document.getElementById("lblPlayersIn").textContent = t("lblPlayersIn");
  document.getElementById("coachLoginTitle").textContent = t("coachLoginTitle");
  document.getElementById("coachLoginDesc").textContent = t("coachLoginDesc");
  document.getElementById("lblCoachPw").textContent = t("lblCoachPw");
  document.getElementById("coachPwBtn").textContent = t("coachPwBtn");
  document.getElementById("navPlayers").textContent = t("navPlayers");
  document.getElementById("navPlans").textContent = t("navPlans");
  document.getElementById("lblPlan").textContent = t("lblPlan");
}

const COACH_PW_KEY = "sommarbingo.coachAuth";
function checkCoachAuth(){
  if (localStorage.getItem(COACH_PW_KEY) === "1"){
    document.getElementById("coachLogin").style.display = "none";
    document.getElementById("appWrap").style.display = "block";
    return true;
  }
  document.getElementById("coachLogin").style.display = "flex";
  document.getElementById("appWrap").style.display = "none";
  return false;
}
function tryCoachLogin(){
  const pw = document.getElementById("coachPw").value;
  const expected = window.COACH_PASSWORD || "";
  if (pw && pw === expected){
    localStorage.setItem(COACH_PW_KEY, "1");
    document.getElementById("coachPwStatus").textContent = "";
    checkCoachAuth();
    if (window.DEFAULT_TEAM_CODE){
      document.getElementById("teamCode").value = window.DEFAULT_TEAM_CODE;
      loadPlayers();
    }
  } else {
    document.getElementById("coachPwStatus").textContent = t("coachPwWrong");
  }
}
document.getElementById("coachPwBtn").onclick = tryCoachLogin;
document.getElementById("coachPw").addEventListener("keydown", e => { if (e.key === "Enter") tryCoachLogin(); });
document.getElementById("pwToggle").onclick = () => {
  const inp = document.getElementById("coachPw");
  const open = document.getElementById("pwEyeOpen");
  const closed = document.getElementById("pwEyeClosed");
  if (inp.type === "password"){ inp.type = "text"; open.style.display = "none"; closed.style.display = "block"; }
  else { inp.type = "password"; open.style.display = "block"; closed.style.display = "none"; }
};

function initAppwrite(){
  if (window.APPWRITE_PROJECT_ID && window.Appwrite){
    const client = new window.Appwrite.Client()
      .setEndpoint(window.APPWRITE_ENDPOINT)
      .setProject(window.APPWRITE_PROJECT_ID);
    awDatabases = new window.Appwrite.Databases(client);
  }
}

function setStatus(msg, kind){
  const el = document.getElementById("status");
  el.textContent = msg; el.className = "status " + (kind || "");
}

let teamPlans = [];
let selectedPlanId = "all";
let allProgressDocs = [];

async function loadPlayers(){
  if (!awDatabases){ setStatus(t("notConfigured"), "err"); return; }
  const team = document.getElementById("teamCode").value.trim();
  if (!team){ setStatus(t("enterTeam"), "err"); return; }
  currentTeam = team;
  setStatus(t("loading"), "");
  try {
    // Fetch plans for this team
    const plansRes = await awDatabases.listDocuments(window.APPWRITE_DATABASE_ID, "plans");
    teamPlans = plansRes.documents.filter(p => p.team_code === team);
    renderPlanSelector();
    // Fetch all progress docs for team
    const res = await awDatabases.listDocuments(
      window.APPWRITE_DATABASE_ID, window.APPWRITE_TABLE_ID,
      [window.Appwrite.Query.equal("team_code", team), window.Appwrite.Query.limit(100)]
    );
    allProgressDocs = res.documents || [];
    filterAndRenderPlayers();
    setStatus(t("playersCount")(allProgressDocs.length), "ok");
    document.getElementById("lastLoad").textContent = t("updatedPrefix") + new Date().toLocaleTimeString("sv-SE");
  } catch(e){ setStatus(t("loadFail")(e.message || e), "err"); }
}

function renderPlanSelector(){
  const wrap = document.getElementById("planSelectorWrap");
  const select = document.getElementById("planSelect");
  if (teamPlans.length === 0){
    wrap.style.display = "none";
    return;
  }
  wrap.style.display = "block";
  let options = `<option value="all">${t("allPlans")}</option>`;
  options += `<option value="legacy">${t("legacyPlan")}</option>`;
  teamPlans.forEach(p => {
    const name = lang === "sv" ? p.name : (p.name_en || p.name);
    options += `<option value="${p.$id}">${escapeHtml(name)} (${p.start_date}→${p.end_date})</option>`;
  });
  select.innerHTML = options;
  select.value = selectedPlanId;
}

function filterAndRenderPlayers(){
  let players = allProgressDocs.slice();
  if (selectedPlanId === "legacy"){
    // Docs without a plan ID in their doc ID (old format: name_team)
    players = players.filter(p => {
      const id = p.$id;
      // Old format: name_team (no plan ID suffix)
      // New format: name_team_planId
      // Check if ID contains a plan ID from teamPlans
      return !teamPlans.some(plan => id.endsWith("_" + plan.$id));
    });
  } else if (selectedPlanId !== "all"){
    players = players.filter(p => p.$id.endsWith("_" + selectedPlanId));
  }
  players.sort((a,b) => (a.player_name||"").localeCompare(b.player_name||""));
  lastPlayers = players;
  renderPlayers(players);
}

function getPlanItemsForCoach(){
  if (selectedPlanId === "all" || selectedPlanId === "legacy"){
    return null; // Use hardcoded fallback
  }
  const plan = teamPlans.find(p => p.$id === selectedPlanId);
  if (!plan) return null;
  return JSON.parse(plan.items || "[]");
}

function cellLabelForPlan(i){
  const items = getPlanItemsForCoach();
  if (items && items[i]){
    const item = items[i];
    return item[lang] || item.sv || "";
  }
  // Fallback to hardcoded labels
  const isStyrke = STYRKE_CELLS.includes(i);
  if (isStyrke) return lang === "sv" ? "Styrkegymnastik" : "Strength program";
  const row = Math.floor(i / 6), col = i % 6;
  const cell = BINGO_LABELS[row][col];
  if (typeof cell === "string") return cell;
  return cell[lang] || cell.sv;
}

function safeParse(s, fallback){ try { return JSON.parse(s) || fallback; } catch(e){ return fallback; } }

function renderPlayers(players){
  document.getElementById("playersCard").style.display = "block";
  document.getElementById("teamLabel").textContent = currentTeam;
  const wrap = document.getElementById("playersList");
  if (!players.length){ wrap.innerHTML = `<div class="empty">${t("empty")}</div>`; return; }
  const planItems = getPlanItemsForCoach();
  wrap.innerHTML = players.map((p, i) => {
    const bingo = safeParse(p.bingo, []);
    const cellData = safeParse(p.styrke, {});
    const merged = safeParse(p.notes, {});
    const notes = {}, dates = {};
    Object.keys(merged).forEach(k => {
      if (k.startsWith("date:")) dates[k.slice(5)] = merged[k];
      else notes[k] = merged[k];
    });
    window._currentNotes = notes;
    window._currentDates = dates;
    // Count completed cells (considering reps/timer completion)
    let bingoDone = 0;
    for (let idx = 0; idx < 36; idx++){
      if (planItems && planItems[idx]){
        const item = planItems[idx];
        const type = item.type || "text";
        if (type === "text"){
          if (bingo.includes(idx)) bingoDone++;
        } else if (type === "reps"){
          const d = cellData[idx];
          if (d && d.count >= (item.target || 1)) bingoDone++;
        } else if (type === "timer"){
          const d = cellData[idx];
          if (d && d.sets_done >= (item.sets || 1)) bingoDone++;
        }
      } else {
        if (bingo.includes(idx)) bingoDone++;
      }
    }
    const pct = Math.round((bingoDone / 36) * 100);
    const updated = p.updated_at ? new Date(p.updated_at).toLocaleString("sv-SE", {day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"}) : "—";
    const initial = (p.player_name || "?").charAt(0).toUpperCase();
    const circumference = 2 * Math.PI * 18;
    const dashOffset = circumference * (1 - pct/100);
    return `<div class="player-row" id="row-${i}">
      <div class="summary" onclick="toggleRow(${i})">
        <div class="avatar">${initial}</div>
        <div class="info">
          <div class="name">${escapeHtml(p.player_name)}</div>
          <div class="stats">
            <span class="bingo-stat">🎯 ${bingoDone}/36</span>
            <span>${updated}</span>
          </div>
        </div>
        <div class="pct-circle">
          <svg width="44" height="44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="var(--surface2)" stroke-width="4"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke="var(--green)" stroke-width="4" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
          </svg>
          <div class="pct-text">${pct}%</div>
        </div>
      </div>
      <div class="detail">
        <div class="detail-section">
          <div class="label">${t("bingoLabel")}</div>
          <div class="mini-grid">${renderMiniBingo(bingo, cellData, notes, dates, p.player_name, planItems)}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderMiniBingo(bingo, cellData, notes, dates, playerName, planItems){
  let html = "";
  for (let i = 0; i < 36; i++){
    let done, typeClass = "";
    if (planItems && planItems[i]){
      const item = planItems[i];
      const type = item.type || "text";
      typeClass = type;
      if (type === "text"){
        done = bingo.includes(i);
      } else if (type === "reps"){
        const d = cellData[i];
        done = d && d.count >= (item.target || 1);
      } else if (type === "timer"){
        const d = cellData[i];
        done = d && d.sets_done >= (item.sets || 1);
      }
    } else {
      done = bingo.includes(i);
      if (STYRKE_CELLS.includes(i)) typeClass = "styrke";
    }
    const hasNote = notes && notes[i];
    const dateStr = dates && dates[i] ? dates[i].slice(5) : ""; // MM-DD
    const label = cellLabelForPlan(i);
    const clickable = hasNote ? "clickable" : "";
    const onclick = hasNote ? `onclick="showCellDetail(${i}, ${JSON.stringify(playerName).replace(/"/g,'&quot;')})"` : "";
    const dateHtml = dateStr ? `<span class="mini-date">${dateStr}</span>` : "";
    const noteHtml = hasNote ? '<span class="mini-note">📝</span>' : '';
    html += `<div class="mini-cell ${done?'done':''} ${typeClass} ${hasNote?'has-note':''} ${clickable}" ${onclick} title="${escapeHtml(label)}"><span class="mini-num">${i+1}</span>${noteHtml}${dateHtml}</div>`;
  }
  return html;
}

function showCellDetail(idx, playerName){
  const label = cellLabelForPlan(idx);
  const note = window._currentNotes && window._currentNotes[idx] || "";
  const date = window._currentDates && window._currentDates[idx] || "";
  const modal = document.getElementById("cellDetailModal");
  const title = document.getElementById("cellDetailTitle");
  const sub = document.getElementById("cellDetailSub");
  const body = document.getElementById("cellDetailBody");
  title.textContent = `#${idx+1} · ${label}`;
  sub.textContent = playerName;
  let html = "";
  if (date) html += `<div class="cell-detail-row"><span class="cell-detail-label">📅</span><span class="cell-detail-val">${escapeHtml(date)}</span></div>`;
  if (note) html += `<div class="cell-detail-row"><span class="cell-detail-label">📝</span><span class="cell-detail-val note-val">${escapeHtml(note)}</span></div>`;
  if (!html) html = `<div style="color:var(--muted);text-align:center;padding:20px">${t("noNote")}</div>`;
  body.innerHTML = html;
  modal.classList.add("show");
}

function closeCellDetail(){
  document.getElementById("cellDetailModal").classList.remove("show");
}

function renderStyrkeChips(styrke){
  return STYRKE_NAMES[lang].map((name, i) => {
    const st = styrke[i] || {};
    const done = st.done;
    const stat = done ? "✓" : (st.count != null ? `${st.count}` : st.elapsed != null ? `${st.elapsed}s` : "—");
    return `<span class="styrke-chip ${done?'done':''}" title="${escapeHtml(name)}">${i+1}. ${escapeHtml(name)} <span class="stat">${stat}</span></span>`;
  }).join("");
}

function toggleRow(i){ document.getElementById("row-" + i).classList.toggle("expanded"); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
