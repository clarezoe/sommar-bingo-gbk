<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach — Sommarbingo</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17"></script>
<script src="./config.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --text:#f1f5f9;
    --muted:#94a3b8; --accent:#22c55e; --accent2:#f59e0b; --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f172a,#1e293b); color:var(--text); min-height:100vh;
  }
  .wrap{max-width:900px; margin:0 auto; padding:16px}
  header{text-align:center; padding:8px 0 16px}
  header h1{margin:0 0 4px; font-size:clamp(20px,4vw,28px)}
  header .sub{color:var(--muted); font-size:14px}
  .lang-toggle{display:inline-flex; gap:0; margin:8px 0 0; border:1px solid var(--panel2); border-radius:8px; overflow:hidden}
  .lang-toggle button{background:var(--panel); color:var(--muted); border:none; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit}
  .lang-toggle button.active{background:var(--accent); color:#052e16}
  .card{background:var(--panel); border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 4px 14px rgba(0,0,0,.35)}
  label{display:block; font-size:13px; color:var(--muted); margin:10px 0 4px}
  input{width:100%; padding:12px; border-radius:10px; border:2px solid var(--panel2); background:var(--bg); color:var(--text); font-size:16px; font-family:inherit}
  input:focus{outline:none; border-color:var(--accent)}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:10px; padding:12px 18px; font-size:14px; font-weight:600; transition:transform .1s}
  button:active{transform:scale(.96)}
  .btn-primary{background:var(--accent); color:#052e16}
  .btn-secondary{background:var(--panel2); color:var(--text)}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .status{font-size:12px; color:var(--muted); margin-top:8px}
  .status.err{color:var(--danger)}
  .status.ok{color:var(--accent)}

  table{width:100%; border-collapse:collapse; margin-top:10px}
  th, td{padding:10px 8px; text-align:left; border-bottom:1px solid var(--panel2); font-size:13px}
  th{color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px}
  tr:hover td{background:var(--panel2)}
  .pct-bar{background:var(--panel2); border-radius:999px; height:8px; overflow:hidden; min-width:80px; display:inline-block; vertical-align:middle}
  .pct-bar > div{height:100%; background:var(--accent); transition:width .3s}
  .pct-bar.styrke > div{background:var(--accent2)}
  .num{font-variant-numeric:tabular-nums; font-weight:700}
  .row-detail{display:none; background:var(--bg); padding:10px}
  .row-detail.show{display:block}
  .mini-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:3px; max-width:500px; margin:8px 0}
  .mini-cell{aspect-ratio:1; background:var(--panel2); border-radius:3px; font-size:9px; display:flex; align-items:center; justify-content:center; color:var(--muted)}
  .mini-cell.done{background:var(--accent); color:#052e16; font-weight:700}
  .mini-cell.styrke.done{background:var(--accent2); color:#1e293b}
  .updated{color:var(--muted); font-size:11px}
  .empty{text-align:center; color:var(--muted); padding:30px; font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📋 <span id="hTitle"></span></h1>
    <div class="sub" id="hSub"></div>
    <div class="lang-toggle">
      <button id="langSv" class="active" onclick="setLang('sv')">SV</button>
      <button id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="card">
    <label for="teamCode" id="lblTeam"></label>
    <div class="toolbar">
      <input id="teamCode" type="text" placeholder="t.ex. GBK" style="flex:1; min-width:120px" autocomplete="off">
      <button class="btn-primary" id="loadBtn"></button>
      <button class="btn-secondary" id="refreshBtn"></button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="playersCard" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px">
      <h3 style="margin:0"><span id="lblPlayersIn"></span> <span id="teamLabel"></span></h3>
      <span class="updated" id="lastLoad"></span>
    </div>
    <div id="playersTable"></div>
  </div>
</div>

<script>
let awDatabases = null;
let currentTeam = "";
let lang = localStorage.getItem("sommarbingo.lang") || "sv";

const I18N = {
  sv: {
    hTitle: "Coach Dashboard",
    hSub: "Sommarbingo U11-U13 · se alla spelares framsteg",
    lblTeam: "Lagkod",
    loadBtn: "Ladda spelare",
    refreshBtn: "↻ Uppdatera",
    lblPlayersIn: "Spelare i",
    thPlayer: "Spelare", thBingo: "Bingo", thStyrke: "Styrke (ggr)", thTotal: "Total",
    thUpdated: "Uppdaterad", thDetail: "", detailBtn: "Detaljer",
    bingoLabel: "Bingo-bricka (grön=klar, gul=styrke):",
    styrkeLabel: "Styrkegymnastik:",
    empty: "Inga spelare har registrerat sig för detta lagkod än.",
    loading: "Laddar...",
    enterTeam: "Ange lagkod.",
    notConfigured: "Appwrite inte konfigurerad.",
    loadFail: (m) => "Kunde inte ladda: " + m,
    playersCount: (n) => `${n} spelare`,
    updatedPrefix: "Uppdaterad ",
  },
  en: {
    hTitle: "Coach Dashboard",
    hSub: "Summer Bingo U11-U13 · see all players' progress",
    lblTeam: "Team code",
    loadBtn: "Load players",
    refreshBtn: "↻ Refresh",
    lblPlayersIn: "Players in",
    thPlayer: "Player", thBingo: "Bingo", thStyrke: "Strength (x)", thTotal: "Total",
    thUpdated: "Updated", thDetail: "", detailBtn: "Details",
    bingoLabel: "Bingo board (green=done, yellow=strength):",
    styrkeLabel: "Strength program:",
    empty: "No players have registered for this team code yet.",
    loading: "Loading...",
    enterTeam: "Enter team code.",
    notConfigured: "Appwrite not configured.",
    loadFail: (m) => "Could not load: " + m,
    playersCount: (n) => `${n} players`,
    updatedPrefix: "Updated ",
  }
};
function t(key){ const v = I18N[lang][key]; return typeof v === "function" ? v : v; }

function setLang(l){
  lang = l;
  localStorage.setItem("sommarbingo.lang", l);
  document.documentElement.lang = l;
  document.getElementById("langSv").classList.toggle("active", l === "sv");
  document.getElementById("langEn").classList.toggle("active", l === "en");
  applyTexts();
  if (currentTeam) renderPlayers(currentTeam, lastPlayers);
}

let lastPlayers = [];

function applyTexts(){
  document.getElementById("hTitle").textContent = t("hTitle");
  document.getElementById("hSub").textContent = t("hSub");
  document.getElementById("lblTeam").textContent = t("lblTeam");
  document.getElementById("loadBtn").textContent = t("loadBtn");
  document.getElementById("refreshBtn").textContent = t("refreshBtn");
  document.getElementById("lblPlayersIn").textContent = t("lblPlayersIn");
}

function initAppwrite(){
  if (window.APPWRITE_PROJECT_ID && window.Appwrite){
    const client = new window.Appwrite.Client()
      .setEndpoint(window.APPWRITE_ENDPOINT)
      .setProject(window.APPWRITE_PROJECT_ID);
    awDatabases = new window.Appwrite.Databases(client);
  }
}

function setStatus(msg, kind){
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + (kind || "");
}

async function loadPlayers(){
  if (!awDatabases){ setStatus(t("notConfigured"), "err"); return; }
  const team = document.getElementById("teamCode").value.trim();
  if (!team){ setStatus(t("enterTeam"), "err"); return; }
  currentTeam = team;
  setStatus(t("loading"), "");
  try {
    const res = await awDatabases.listDocuments(
      window.APPWRITE_DATABASE_ID,
      window.APPWRITE_TABLE_ID,
      [window.Appwrite.Query.equal("team_code", team), window.Appwrite.Query.limit(100)]
    );
    const players = (res.documents || []).slice().sort((a,b) => (a.player_name||"").localeCompare(b.player_name||""));
    lastPlayers = players;
    renderPlayers(team, players);
    setStatus(t("playersCount")(players.length), "ok");
    document.getElementById("lastLoad").textContent = t("updatedPrefix") + new Date().toLocaleTimeString("sv-SE");
  } catch(e){
    setStatus(t("loadFail")(e.message || e), "err");
  }
}

function safeParse(s, fallback){
  try { return JSON.parse(s) || fallback; } catch(e){ return fallback; }
}

function renderPlayers(team, players){
  if (!players) return;
  document.getElementById("playersCard").style.display = "block";
  document.getElementById("teamLabel").textContent = team;
  const wrap = document.getElementById("playersTable");
  if (!players.length){
    wrap.innerHTML = `<div class="empty">${t("empty")}</div>`;
    return;
  }
  let html = `<table><thead><tr><th>${t("thPlayer")}</th><th>${t("thBingo")}</th><th>${t("thStyrke")}</th><th>${t("thTotal")}</th><th>${t("thUpdated")}</th><th>${t("thDetail")}</th></tr></thead><tbody>`;
  players.forEach((p, i) => {
    const bingo = safeParse(p.bingo, []);
    const styrke = safeParse(p.styrke, []);
    const bingoDone = bingo.length;
    // Styrke completions = how many of the 3 STYRKE bingo cells are marked
    const styrkeCompletions = STYRKE_CELLS.filter(idx => bingo.includes(idx)).length;
    const styrkeStepDone = STYRKE_COUNT ? styrke.filter(s => s && s.done).length : 0;
    const totalPct = Math.round((bingoDone / 30) * 100);
    const styrkePct = Math.round((styrkeCompletions / 3) * 100);
    const updated = p.updated_at ? new Date(p.updated_at).toLocaleString("sv-SE", {day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"}) : "—";
    html += `<tr>
      <td><strong>${escapeHtml(p.player_name)}</strong></td>
      <td><span class="num">${bingoDone}/30</span> <span class="pct-bar"><div style="width:${totalPct}%"></div></span></td>
      <td><span class="num">${styrkeCompletions}/3</span> <span class="pct-bar styrke"><div style="width:${styrkePct}%"></div></span></td>
      <td><span class="num">${bingoDone}/30</span></td>
      <td class="updated">${updated}</td>
      <td><button class="btn-secondary" style="padding:6px 10px; font-size:12px" onclick="toggleDetail(${i})">${t("detailBtn")}</button></td>
    </tr>`;
    html += `<tr class="row-detail" id="detail-${i}"><td colspan="6">
      <div style="margin-bottom:8px; color:var(--muted); font-size:12px">${t("bingoLabel")}</div>
      <div class="mini-grid">${renderMiniBingo(bingo)}</div>
      <div style="margin:10px 0 6px; color:var(--muted); font-size:12px">${t("styrkeLabel")}</div>
      <div>${renderStyrkeList(styrke)}</div>
    </td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderMiniBingo(bingo){
  let html = "";
  for (let i = 0; i < 30; i++){
    const done = bingo.includes(i);
    const isStyrke = STYRKE_CELLS.includes(i);
    html += `<div class="mini-cell ${done?'done':''} ${isStyrke?'styrke':''}" title="Ruta ${i+1}">${i+1}</div>`;
  }
  return html;
}

function renderStyrkeList(styrke){
  let html = "<div style='display:flex; flex-wrap:wrap; gap:4px'>";
  STYRKE_NAMES[lang].forEach((name, i) => {
    const st = styrke[i] || {};
    const done = st.done;
    const stat = done ? "✓" : (st.count != null ? `${st.count}` : st.elapsed != null ? `${st.elapsed}s` : "—");
    html += `<span style="font-size:11px; padding:3px 8px; border-radius:6px; background:${done?'var(--accent)':'var(--panel2)'}; color:${done?'#052e16':'var(--text)'}" title="${escapeHtml(name)}">${i+1}. ${escapeHtml(name)} <strong>${stat}</strong></span>`;
  });
  html += "</div>";
  return html;
}

function toggleDetail(i){
  const el = document.getElementById("detail-" + i);
  el.classList.toggle("show");
}

function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

const STYRKE_CELLS = [19, 27, 30];
const STYRKE_NAMES = {
  sv: ["Uppvärmning","Fallskärmshopparen","Klockan","Sidoplanka","Skridskohopp","Enbensböj","Diagonalen","Skidhopp","Dips","Grodhopp","Plankan","Utfallssteg","Ryggresningar","Tåhävningar","Bulgariska utfall","Armhävningar","Defensivsteg","Fällkniv","Steg upp på bänk"],
  en: ["Warm-up","Parachute jump","The clock","Side plank","Skate jumps","Single-leg squat","The diagonal","Skier jumps","Dips","Frog jumps","Plank","Lunges","Back raises","Calf raises","Bulgarian split squats","Push-ups","Defensive steps","V-sit","Step up onto bench"]
};
const STYRKE_COUNT = STYRKE_NAMES.sv.length;

document.getElementById("loadBtn").onclick = loadPlayers;
document.getElementById("refreshBtn").onclick = () => { if (currentTeam) loadPlayers(); };
document.getElementById("teamCode").addEventListener("keydown", e => { if (e.key === "Enter") loadPlayers(); });

initAppwrite();
setLang(lang);
if (window.DEFAULT_TEAM_CODE){
  document.getElementById("teamCode").value = window.DEFAULT_TEAM_CODE;
  loadPlayers();
}
</script>
</body>
</html>
