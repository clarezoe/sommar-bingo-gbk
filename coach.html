<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach">
<meta name="theme-color" content="#22c55e">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>Coach — Sommarbingo</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17"></script>
<script src="./config.js?v=3"></script>
<style>
  :root{
    --bg:#0b1120; --surface:#1e293b; --surface2:#334155; --surface3:#475569;
    --text:#f8fafc; --muted:#94a3b8; --dim:#64748b;
    --green:#22c55e; --green-l:#4ade80;
    --amber:#f59e0b; --amber-l:#fbbf24;
    --red:#ef4444; --blue:#3b82f6; --blue-l:#60a5fa;
    --radius:16px; --radius-sm:10px; --radius-lg:24px;
    --shadow:0 8px 32px rgba(0,0,0,.4);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:900px; margin:0 auto; padding:calc(16px + var(--safe-top)) 16px calc(40px + var(--safe-bottom))}
  .header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px}
  .header h1{margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
  .header .sub{color:var(--muted); font-size:13px; margin-top:2px; font-weight:500}
  .lang-toggle{display:inline-flex; background:var(--surface); border-radius:999px; padding:3px; gap:2px; flex-shrink:0}
  .lang-toggle button{background:transparent; color:var(--muted); border:none; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; border-radius:999px; font-family:inherit}
  .lang-toggle button.active{background:var(--green); color:#052e16}

  button{font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius-sm); padding:14px 18px; font-size:14px; font-weight:700; transition:transform .1s}
  button:active{transform:scale(.97)}
  .btn-primary{background:var(--green); color:#052e16}
  .btn-secondary{background:var(--surface2); color:var(--text)}
  .btn-danger{background:var(--red); color:#fff}
  .btn-amber{background:var(--amber); color:#1e1308}
  .btn-sm{padding:8px 14px; font-size:13px}

  .card{background:var(--surface); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow)}
  .card label{display:block; font-size:12px; color:var(--muted); margin:0 0 8px; font-weight:700; text-transform:uppercase; letter-spacing:.5px}
  input, textarea, select{width:100%; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:16px; font-family:inherit; box-sizing:border-box}
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--green)}
  textarea{resize:vertical; min-height:60px; line-height:1.5}

  /* Login */
  .login-overlay{position:fixed; inset:0; background:linear-gradient(160deg,var(--bg),#1e293b); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px}
  .login-card{background:var(--surface); border-radius:var(--radius-lg); padding:32px 24px; max-width:380px; width:100%; box-shadow:var(--shadow)}
  .login-card h2{margin:0 0 6px; font-size:22px; font-weight:800}
  .login-card .desc{color:var(--muted); font-size:13px; margin-bottom:20px; line-height:1.5}
  .pw-row{position:relative}
  .pw-row .toggle{position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; padding:8px; display:flex; align-items:center}
  .pw-row .toggle svg{width:20px; height:20px}
  .status{font-size:12px; color:var(--muted); margin-top:10px; font-weight:600}
  .status.err{color:var(--red)}
  .status.ok{color:var(--green)}

  /* Plan list */
  .plan-card{background:var(--surface); border-radius:var(--radius); padding:18px; margin-bottom:12px; box-shadow:var(--shadow); cursor:pointer}
  .plan-card:active{transform:scale(.98)}
  .plan-card .plan-name{font-size:17px; font-weight:800; margin-bottom:4px}
  .plan-card .plan-dates{color:var(--muted); font-size:13px; font-weight:600}
  .plan-card .plan-status{display:inline-block; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; margin-top:8px}
  .plan-card .plan-status.published{background:var(--green); color:#052e16}
  .plan-card .plan-status.draft{background:var(--amber); color:#1e1308}
  .plan-card .plan-meta{display:flex; gap:12px; margin-top:8px; font-size:12px; color:var(--muted)}
  .plan-card .plan-actions{display:flex; gap:8px; margin-top:12px}

  /* Builder */
  .builder-header{display:flex; align-items:center; gap:12px; margin-bottom:16px}
  .builder-header .back{background:var(--surface2); color:var(--text); padding:10px 14px; font-size:14px; font-weight:700; border-radius:var(--radius-sm); border:none; cursor:pointer; flex-shrink:0}
  .builder-header h2{margin:0; font-size:20px; font-weight:800; flex:1}

  .step-indicator{display:flex; gap:8px; margin-bottom:20px}
  .step-dot{flex:1; height:4px; border-radius:2px; background:var(--surface2)}
  .step-dot.active{background:var(--green)}
  .step-dot.done{background:var(--green-l)}

  .grid-builder{display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin-bottom:16px}
  .grid-cell{aspect-ratio:1; border-radius:8px; background:var(--surface2); border:2px dashed var(--surface3); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; text-align:center; padding:4px; overflow:hidden; position:relative}
  .grid-cell:active{transform:scale(.95)}
  .grid-cell.filled{border-style:solid; border-color:var(--green); background:var(--surface); color:var(--text)}
  .grid-cell.filled.reps{border-color:var(--blue)}
  .grid-cell.filled.timer{border-color:var(--amber)}
  .grid-cell .cell-num{position:absolute; top:2px; left:4px; font-size:9px; color:var(--dim)}
  .grid-cell .cell-type{position:absolute; top:2px; right:4px; font-size:9px}
  .grid-cell .cell-text{font-size:10px; line-height:1.2; padding:12px 2px 2px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical}

  /* Library sidebar */
  .library-panel{background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:14px}
  .library-panel h3{margin:0 0 12px; font-size:15px; font-weight:800}
  .library-search{margin-bottom:12px}
  .library-list{max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:6px}
  .library-item{background:var(--surface2); border-radius:8px; padding:10px 12px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:8px}
  .library-item:active{background:var(--surface3)}
  .library-item .li-text{font-size:13px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .library-item .li-type{font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; flex-shrink:0}
  .library-item .li-type.text{background:var(--green); color:#052e16}
  .library-item .li-type.reps{background:var(--blue); color:#fff}
  .library-item .li-type.timer{background:var(--amber); color:#1e1308}

  /* Item editor modal */
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:flex-end; justify-content:center; z-index:200; padding:0}
  .modal.show{display:flex; animation:fadeIn .2s}
  .modal-card{background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:20px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; box-shadow:0 -4px 24px rgba(0,0,0,.4); animation:slideUp .3s cubic-bezier(.34,1.56,.64,1)}
  .grip{width:40px; height:4px; background:var(--surface3); border-radius:2px; margin:0 auto 16px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media (min-width:900px){
    .modal{align-items:center; padding:20px}
    .modal-card{border-radius:var(--radius-lg); max-width:480px; max-height:88vh}
    .grip{display:none}
  }

  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px}
  .modal-head h2{margin:0; font-size:18px; font-weight:800}
  .modal-head .close-x{background:transparent; border:none; color:var(--muted); font-size:24px; cursor:pointer; padding:4px 8px; line-height:1}

  .field-group{margin-bottom:16px}
  .field-group label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:.5px}
  .type-selector{display:flex; gap:8px}
  .type-btn{flex:1; padding:12px; border-radius:var(--radius-sm); border:2px solid var(--surface2); background:var(--bg); color:var(--text); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; text-align:center}
  .type-btn.active{border-color:var(--green); background:var(--green); color:#052e16}
  .type-btn.active.reps{border-color:var(--blue); background:var(--blue); color:#fff}
  .type-btn.active.timer{border-color:var(--amber); background:var(--amber); color:#1e1308}

  .translate-btn{background:var(--blue); color:#fff; padding:10px 16px; font-size:13px; font-weight:700; border:none; border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; margin-top:8px}
  .translate-btn:active{transform:scale(.97)}
  .translate-btn:disabled{opacity:.5; cursor:wait}
  .translating{font-size:12px; color:var(--muted); margin-top:6px}

  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:14px}

  .nav-links{display:flex; gap:8px; margin-bottom:16px}
  .nav-links a{flex:1; text-align:center; padding:12px; border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); text-decoration:none; font-size:13px; font-weight:700}
  .nav-links a.active{background:var(--green); color:#052e16}

  .review-item{background:var(--surface2); border-radius:8px; padding:12px; margin-bottom:6px; display:flex; gap:10px; align-items:flex-start}
  .review-item .ri-num{font-size:11px; font-weight:800; color:var(--muted); flex-shrink:0; min-width:24px}
  .review-item .ri-text{font-size:13px; flex:1}
  .review-item .ri-type{font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; flex-shrink:0}
  .review-item .ri-type.text{background:var(--green); color:#052e16}
  .review-item .ri-type.reps{background:var(--blue); color:#fff}
  .review-item .ri-type.timer{background:var(--amber); color:#1e1308}

  .row-2{display:flex; gap:10px}
  .row-2 > *{flex:1}
</style>
</head>
<body>

<div class="login-overlay" id="adminLogin" style="display:flex">
  <div class="login-card">
    <h2 id="loginTitle">Admin-inloggning</h2>
    <div class="desc" id="loginDesc">Ange lösenord för att hantera planer.</div>
    <div class="pw-row">
      <input type="password" id="adminPw" placeholder="Lösenord" style="width:100%;padding-right:48px">
      <button class="toggle" id="pwToggle">
        <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eyeClosed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <button class="btn-primary" id="adminPwBtn" style="width:100%;margin-top:12px">Logga in</button>
    <div class="status" id="loginStatus"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display:none">
  <div class="header">
    <div>
      <h1>📋 <span id="hTitle">Planer</span></h1>
      <div class="sub" id="hSub">Hantera bingo-planer</div>
    </div>
    <div class="lang-toggle">
      <button id="langSv" class="active">SV</button>
      <button id="langEn">EN</button>
    </div>
  </div>

  <div class="nav-links">
    <a href="./plan.html" id="navCoach">👥 Spelare</a>
    <a href="./coach.html" class="active" id="navAdmin">📋 Planer</a>
  </div>

  <div id="planListView">
    <button class="btn-primary" id="newPlanBtn" style="width:100%;margin-bottom:16px">+ Ny plan</button>
    <div id="planList"></div>
  </div>

  <div id="builderView" style="display:none">
    <div class="builder-header">
      <button class="back" id="backBtn">← Tillbaka</button>
      <h2 id="builderTitle">Ny plan</h2>
    </div>
    <div class="step-indicator" id="stepIndicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <!-- Step 1: Name + Dates -->
    <div id="step1" class="card">
      <label id="lblPlanName">Plannamn (svenska)</label>
      <input type="text" id="planNameSv" placeholder="t.ex. Sommarbingo 2026">
      <div style="height:12px"></div>
      <label id="lblPlanNameEn">Plannamn (engelska)</label>
      <input type="text" id="planNameEn" placeholder="e.g. Summer Bingo 2026">
      <div style="height:12px"></div>
      <div class="row-2">
        <div>
          <label id="lblStartDate">Startdatum</label>
          <input type="date" id="planStart">
        </div>
        <div>
          <label id="lblEndDate">Slutdatum</label>
          <input type="date" id="planEnd">
        </div>
      </div>
      <div style="height:16px"></div>
      <button class="btn-primary" id="step1Next" style="width:100%">Nästa →</button>
    </div>

    <!-- Step 2: Build Grid -->
    <div id="step2" style="display:none">
      <div class="card">
        <label id="lblGrid">Bygg bingo-brädet (6×6 = 36 rutor)</label>
        <div class="grid-builder" id="gridBuilder"></div>
      </div>
      <div class="library-panel">
        <h3 id="lblLibrary">Bibliotek — klicka för att lägga till</h3>
        <input type="text" class="library-search" id="libSearch" placeholder="Sök...">
        <div class="library-list" id="libraryList"></div>
      </div>
      <button class="btn-secondary" id="step2Back" style="width:100%;margin-bottom:8px">← Tillbaka</button>
      <button class="btn-primary" id="step2Next" style="width:100%">Nästa →</button>
    </div>

    <!-- Step 3: Review -->
    <div id="step3" style="display:none">
      <div class="card">
        <h3 id="lblReview" style="margin:0 0 12px;font-size:16px">Granska plan</h3>
        <div id="reviewSummary" style="margin-bottom:16px"></div>
        <div id="reviewList"></div>
      </div>
      <button class="btn-secondary" id="step3Back" style="width:100%;margin-bottom:8px">← Tillbaka</button>
      <button class="btn-primary" id="step3Publish" style="width:100%">Publicera</button>
    </div>

    <!-- Step 4: Done -->
    <div id="step4" style="display:none">
      <div class="card" style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <h3 id="lblDone" style="margin:0 0 8px">Plan publicerad!</h3>
        <p id="lblDoneSub" style="color:var(--muted);font-size:14px;margin:0 0 20px">Spelare kan nu se den.</p>
        <button class="btn-primary" id="doneBtn" style="width:100%">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- Item Editor Modal -->
<div class="modal" id="itemModal">
  <div class="modal-card">
    <div class="grip"></div>
    <div class="modal-head">
      <h2 id="itemModalTitle">Ny övning</h2>
      <button class="close-x" id="itemModalClose">×</button>
    </div>
    <div class="field-group">
      <label id="lblItemSv">Text (svenska)</label>
      <textarea id="itemSv" placeholder="t.ex. Hoppa 100 hopprep"></textarea>
    </div>
    <div class="field-group">
      <label id="lblItemEn">Text (engelska)</label>
      <textarea id="itemEn" placeholder="e.g. Jump 100 jump rope"></textarea>
      <button class="translate-btn" id="translateBtn">🌐 Översätt automatiskt</button>
      <div class="translating" id="translateStatus" style="display:none">Översätter...</div>
    </div>
    <div class="field-group">
      <label id="lblType">Typ</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="text" id="typeText">Text (klipp)</button>
        <button class="type-btn" data-type="reps" id="typeReps">Räknare</button>
        <button class="type-btn" data-type="timer" id="typeTimer">Timer</button>
      </div>
    </div>
    <div id="targetFields" style="display:none">
      <div class="field-group">
        <label id="lblTarget">Mål</label>
        <input type="number" id="itemTarget" placeholder="t.ex. 100" min="1">
      </div>
      <div class="field-group" id="setsField" style="display:none">
        <label id="lblSets">Set</label>
        <input type="number" id="itemSets" placeholder="t.ex. 2" min="1" value="1">
      </div>
    </div>
    <div class="field-group">
      <label id="lblHintSv">Tips (svenska, valfritt)</label>
      <input type="text" id="itemHintSv" placeholder="Valfritt tips">
    </div>
    <div class="field-group">
      <label id="lblHintEn">Tips (engelska, valfritt)</label>
      <input type="text" id="itemHintEn" placeholder="Optional hint">
    </div>
    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="btn-secondary" id="itemModalCancel" style="flex:1">Avbryt</button>
      <button class="btn-primary" id="itemModalSave" style="flex:1">Spara</button>
    </div>
  </div>
</div>

<!-- Edit Dates Modal -->
<div class="modal" id="datesModal">
  <div class="modal-card">
    <div class="grip"></div>
    <div class="modal-head">
      <h2 id="datesModalTitle">Redigera datum</h2>
      <button class="close-x" id="datesModalClose">×</button>
    </div>
    <div class="row-2" style="margin-bottom:20px">
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Startdatum</label>
        <input type="date" id="editStart">
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Slutdatum</label>
        <input type="date" id="editEnd">
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" id="datesModalCancel" style="flex:1">Avbryt</button>
      <button class="btn-primary" id="datesModalSave" style="flex:1">Spara</button>
    </div>
  </div>
</div>

<script>
const COACH_PW_KEY = "sommarbingo.coachAuth";
let lang = localStorage.getItem("sommarbingo.lang") || "sv";
let currentStep = 1;
let editingPlan = null;
let gridItems = new Array(36).fill(null);
let selectedCellIdx = -1;
let itemType = "text";
let libraryCache = [];
let editingDatesForPlan = null;

const I18N = {
  sv: {
    hTitle: "Planer", hSub: "Hantera bingo-planer",
    loginTitle: "Admin-inloggning", loginDesc: "Ange lösenord för att hantera planer.",
    lblCoachPw: "Lösenord", pwBtn: "Logga in", pwWrong: "Fel lösenord.",
    navCoach: "👥 Spelare", navAdmin: "📋 Planer",
    newPlan: "+ Ny plan", noPlans: "Inga planer än. Skapa en ny!",
    planName: "Plannamn (svenska)", planNameEn: "Plannamn (engelska)",
    startDate: "Startdatum", endDate: "Slutdatum",
    next: "Nästa →", back: "← Tillbaka",
    buildGrid: "Bygg bingo-brädet (6×6 = 36 rutor)",
    library: "Bibliotek — klicka för att lägga till",
    search: "Sök...",
    review: "Granska plan", publish: "Publicera",
    done: "Plan publicerad!", doneSub: "Spelare kan nu se den.",
    newItem: "Ny övning", editItem: "Redigera övning",
    itemSv: "Text (svenska)", itemEn: "Text (engelska)",
    type: "Typ", typeText: "Text (klipp)", typeReps: "Räknare", typeTimer: "Timer",
    target: "Mål", sets: "Set",
    hintSv: "Tips (svenska, valfritt)", hintEn: "Tips (engelska, valfritt)",
    translate: "🌐 Översätt automatiskt", translating: "Översätter...",
    translateFail: "Kunde inte översätta. Fyll i manuellt.",
    cancel: "Avbryt", save: "Spara",
    editDates: "Redigera datum", duplicate: "Duplicera", delete: "Radera",
    deleteConfirm: "Radera denna plan? All spelarprogress för denna plan försvinner.",
    published: "Publicerad", draft: "Utkast",
    cells: "rutor", emptyCell: "Tom", tapToAdd: "Tryck för att lägga till",
    editDatesTitle: "Redigera datum", datesSaved: "Datum sparade!",
    fillAllCells: "Fyll alla 36 rutor innan du publicerar.",
    planPublished: "Plan publicerad!",
  },

function t(k){ const v = I18N[lang][k]; return typeof v === "function" ? v : v; }

function setLang(l){
  lang = l;
  localStorage.setItem("sommarbingo.lang", l);
  document.getElementById("langSv").classList.toggle("active", l === "sv");
  document.getElementById("langEn").classList.toggle("active", l === "en");
  applyI18n();
}
function applyI18n(){
  const map = {
    hTitle: "hTitle", hSub: "hSub", loginTitle: "loginTitle", loginDesc: "loginDesc",
    navCoach: "navCoach", navAdmin: "navAdmin", newPlan: "newPlanBtn",
    planName: "lblPlanName", planNameEn: "lblPlanNameEn",
    startDate: "lblStartDate", endDate: "lblEndDate",
    buildGrid: "lblGrid", library: "lblLibrary", search: "libSearch",
    review: "lblReview", publish: "step3Publish",
    done: "lblDone", doneSub: "lblDoneSub",
    newItem: "itemModalTitle", itemSv: "lblItemSv", itemEn: "lblItemEn",
    type: "lblType", typeText: "typeText", typeReps: "typeReps", typeTimer: "typeTimer",
    target: "lblTarget", sets: "lblSets", hintSv: "lblHintSv", hintEn: "lblHintEn",
    translate: "translateBtn", cancel: "itemModalCancel", save: "itemModalSave",
    editDatesTitle: "datesModalTitle",
  };
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el){
      if (k === "search") el.placeholder = t(k);
      else if (k === "newPlan") el.textContent = t(k);
      else if (k === "translate") el.textContent = t(k);
      else if (k === "publish") el.textContent = t(k);
      else if (k === "save") el.textContent = t(k);
      else if (k === "cancel") el.textContent = t(k);
      else if (k === "done") el.textContent = t(k);
      else if (k === "doneSub") el.textContent = t(k);
      else if (k === "newItem" || k === "editDatesTitle") el.textContent = t(k);
      else if (k === "typeText" || k === "typeReps" || k === "typeTimer") el.textContent = t(k);
      else if (el.tagName === "LABEL") el.textContent = t(k);
      else el.textContent = t(k);
    }
  });
  document.getElementById("loginTitle").textContent = t("loginTitle");
  document.getElementById("loginDesc").textContent = t("loginDesc");
  document.getElementById("adminPwBtn").textContent = t("pwBtn");
  document.getElementById("adminPw").placeholder = t("lblCoachPw");
  document.getElementById("step1Next").textContent = t("next");
  document.getElementById("step2Back").textContent = t("back");
  document.getElementById("step2Next").textContent = t("next");
  document.getElementById("step3Back").textContent = t("back");
  document.getElementById("itemModalCancel").textContent = t("cancel");
  document.getElementById("itemModalSave").textContent = t("save");
  document.getElementById("datesModalCancel").textContent = t("cancel");
  document.getElementById("datesModalSave").textContent = t("save");
  document.getElementById("itemModalClose").setAttribute("aria-label", t("cancel"));
  if (currentStep <= 1) renderPlanList();
}

// ---------- Auth ----------
function checkAuth(){
  if (localStorage.getItem(COACH_PW_KEY) === "1"){
    document.getElementById("adminLogin").style.display = "none";
    document.getElementById("appWrap").style.display = "block";
    return true;
  }
  document.getElementById("adminLogin").style.display = "flex";
  document.getElementById("appWrap").style.display = "none";
  return false;
}

function doLogin(){
  const pw = document.getElementById("adminPw").value;
  const status = document.getElementById("loginStatus");
  if (pw === (window.COACH_PASSWORD || "")){
    localStorage.setItem(COACH_PW_KEY, "1");
    status.className = "status ok";
    status.textContent = "✓";
    checkAuth();
    loadPlans();
    loadLibrary();
  } else {
    status.className = "status err";
    status.textContent = t("pwWrong");
  }
}

// ---------- Appwrite ----------
let databases;
function initAppwrite(){
  const { Client, Databases } = window.Appwrite;
  const client = new Client();
  client.setEndpoint(window.APPWRITE_ENDPOINT).setProject(window.APPWRITE_PROJECT_ID);
  databases = new Databases(client);
}

async function loadPlans(){
  const list = document.getElementById("planList");
  list.innerHTML = `<div class="empty">${lang === "sv" ? "Laddar..." : "Loading..."}</div>`;
  try {
    const res = await databases.listDocuments(window.APPWRITE_DATABASE_ID, "plans");
    if (res.documents.length === 0){
      list.innerHTML = `<div class="empty">${t("noPlans")}</div>`;
      return;
    }
    list.innerHTML = res.documents.map(p => {
      const statusClass = p.status === "published" ? "published" : "draft";
      const itemCount = JSON.parse(p.items || "[]").length;
      return `<div class="plan-card" data-id="${p.$id}">
        <div class="plan-name">${escapeHtml(p.name)}</div>
        <div class="plan-dates">📅 ${p.start_date} → ${p.end_date}</div>
        <span class="plan-status ${statusClass}">${t(p.status)}</span>
        <div class="plan-meta"><span>${itemCount} ${t("cells")}</span></div>
        <div class="plan-actions">
          <button class="btn-secondary btn-sm" onclick="event.stopPropagation();editDates('${p.$id}','${p.start_date}','${p.end_date}')">${t("editDates")}</button>
          <button class="btn-secondary btn-sm" onclick="event.stopPropagation();duplicatePlan('${p.$id}')">${t("duplicate")}</button>
          <button class="btn-danger btn-sm" onclick="event.stopPropagation();deletePlan('${p.$id}')">${t("delete")}</button>
        </div>
      </div>`;
    }).join("");
  } catch(e){
    list.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
  }
}

async function loadLibrary(){
  try {
    const res = await databases.listDocuments(window.APPWRITE_DATABASE_ID, "items", undefined, 100);
    libraryCache = res.documents;
    renderLibrary("");
  } catch(e){
    console.error("Library load failed:", e);
  }
}

function renderLibrary(filter){
  const list = document.getElementById("libraryList");
  const filtered = filter ? libraryCache.filter(i =>
    i.sv.toLowerCase().includes(filter.toLowerCase()) || i.en.toLowerCase().includes(filter.toLowerCase())
  ) : libraryCache;
  if (filtered.length === 0){
    list.innerHTML = `<div class="empty" style="padding:20px">${lang === "sv" ? "Inga övningar hittades" : "No items found"}</div>`;
    return;
  }
  list.innerHTML = filtered.map(item => {
    const typeLabel = {text: "Text", reps: "Rep", timer: "Time"}[item.type] || item.type;
    const targetLabel = item.default_target ? ` (${item.default_target})` : "";
    return `<div class="library-item" data-id="${item.$id}">
      <span class="li-text">${escapeHtml(item.sv)}${targetLabel}</span>
      <span class="li-type ${item.type}">${typeLabel}</span>
    </div>`;
  }).join("");
  list.querySelectorAll(".library-item").forEach(el => {
    el.onclick = () => {
      const item = libraryCache.find(i => i.$id === el.dataset.id);
      if (item && selectedCellIdx >= 0){
        gridItems[selectedCellIdx] = {
          sv: item.sv, en: item.en, type: item.type,
          target: item.default_target || null, sets: item.default_sets || null,
          hint_sv: item.hint_sv || "", hint_en: item.hint_en || "",
          library_id: item.$id
        };
        renderGrid();
        incrementUsage(item.$id);
      }
    };
  });
}

async function incrementUsage(itemId){
  try {
    const item = libraryCache.find(i => i.$id === itemId);
    if (item){
      await databases.updateDocument(window.APPWRITE_DATABASE_ID, "items", itemId, {
        usage_count: (item.usage_count || 0) + 1
      });
    }
  } catch(e){}
}

// ---------- Builder ----------
function startNewPlan(){
  editingPlan = null;
  gridItems = new Array(36).fill(null);
  currentStep = 1;
  document.getElementById("planNameSv").value = "";
  document.getElementById("planNameEn").value = "";
  document.getElementById("planStart").value = "";
  document.getElementById("planEnd").value = "";
  document.getElementById("builderTitle").textContent = lang === "sv" ? "Ny plan" : "New plan";
  showStep(1);
  document.getElementById("planListView").style.display = "none";
  document.getElementById("builderView").style.display = "block";
  renderGrid();
  loadLibrary();
}

async function duplicatePlan(planId){
  try {
    const p = await databases.getDocument(window.APPWRITE_DATABASE_ID, "plans", planId);
    gridItems = JSON.parse(p.items || "[]");
    while (gridItems.length < 36) gridItems.push(null);
    document.getElementById("planNameSv").value = p.name + " (kopia)";
    document.getElementById("planNameEn").value = (p.name_en || p.name) + " (copy)";
    document.getElementById("planStart").value = "";
    document.getElementById("planEnd").value = "";
    editingPlan = null;
    document.getElementById("builderTitle").textContent = lang === "sv" ? "Duplicera plan" : "Duplicate plan";
    currentStep = 1;
    showStep(1);
    document.getElementById("planListView").style.display = "none";
    document.getElementById("builderView").style.display = "block";
    renderGrid();
  } catch(e){
    alert(e.message);
  }
}

async function deletePlan(planId){
  if (!confirm(t("deleteConfirm"))) return;
  try {
    await databases.deleteDocument(window.APPWRITE_DATABASE_ID, "plans", planId);
    loadPlans();
  } catch(e){
    alert(e.message);
  }
}

function showStep(n){
  currentStep = n;
  for (let i = 1; i <= 4; i++){
    document.getElementById("step" + i).style.display = i === n ? "block" : "none";
  }
  const dots = document.querySelectorAll(".step-dot");
  dots.forEach((d, i) => {
    d.classList.remove("active", "done");
    if (i < n - 1) d.classList.add("done");
    else if (i === n - 1) d.classList.add("active");
  });
}

function renderGrid(){
  const grid = document.getElementById("gridBuilder");
  grid.innerHTML = gridItems.map((item, i) => {
    const filled = item ? "filled" : "";
    const typeClass = item ? item.type : "";
    const typeIcon = item ? ({text:"", reps:"🔢", timer:"⏱"})[item.type] : "";
    const text = item ? item.sv : "";
    const display = item ? `<span class="cell-text">${escapeHtml(text)}</span>` : `<span style="font-size:18px;color:var(--dim)">+</span>`;
    return `<div class="grid-cell ${filled} ${typeClass}" data-idx="${i}">
      <span class="cell-num">${i+1}</span>
      ${typeIcon ? `<span class="cell-type">${typeIcon}</span>` : ""}
      ${display}
    </div>`;
  }).join("");
  grid.querySelectorAll(".grid-cell").forEach(el => {
    el.onclick = () => {
      const idx = Number(el.dataset.idx);
      selectedCellIdx = idx;
      const item = gridItems[idx];
      if (item){
        openItemModal(item, idx);
      } else {
        openItemModal(null, idx);
      }
    };
  });
}

// ---------- Item Modal ----------
function openItemModal(item, idx){
  selectedCellIdx = idx;
  document.getElementById("itemModalTitle").textContent = item ? t("editItem") : t("newItem");
  document.getElementById("itemSv").value = item ? item.sv : "";
  document.getElementById("itemEn").value = item ? item.en : "";
  document.getElementById("itemHintSv").value = item ? (item.hint_sv || "") : "";
  document.getElementById("itemHintEn").value = item ? (item.hint_en || "") : "";
  itemType = item ? item.type : "text";
  document.getElementById("itemTarget").value = item && item.target ? item.target : "";
  document.getElementById("itemSets").value = item && item.sets ? item.sets : "1";
  updateTypeButtons();
  document.getElementById("itemModal").classList.add("show");
  setTimeout(() => document.getElementById("itemSv").focus(), 100);
}

function updateTypeButtons(){
  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.remove("active", "reps", "timer");
    if (btn.dataset.type === itemType){
      btn.classList.add("active");
      if (itemType === "reps") btn.classList.add("reps");
      else if (itemType === "timer") btn.classList.add("timer");
    }
  });
  const showTarget = itemType !== "text";
  document.getElementById("targetFields").style.display = showTarget ? "block" : "none";
  document.getElementById("setsField").style.display = itemType === "timer" ? "block" : "none";
}

async function translateText(){
  const sv = document.getElementById("itemSv").value.trim();
  if (!sv) return;
  const btn = document.getElementById("translateBtn");
  const status = document.getElementById("translateStatus");
  btn.disabled = true;
  status.style.display = "block";
  status.textContent = t("translating");
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sv)}&langpair=sv|en`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200 || data.responseData){
      document.getElementById("itemEn").value = data.responseData.translatedText;
      status.style.display = "none";
    } else {
      status.textContent = t("translateFail");
    }
  } catch(e){
    status.textContent = t("translateFail");
  }
  btn.disabled = false;
}

function saveItem(){
  const sv = document.getElementById("itemSv").value.trim();
  const en = document.getElementById("itemEn").value.trim();
  if (!sv){
    alert(lang === "sv" ? "Fyll i svensk text" : "Fill in Swedish text");
    return;
  }
  if (!en){
    alert(lang === "sv" ? "Fyll i engelsk text" : "Fill in English text");
    return;
  }
  const target = itemType !== "text" ? Number(document.getElementById("itemTarget").value) || null : null;
  const sets = itemType === "timer" ? Number(document.getElementById("itemSets").value) || 1 : null;
  const item = {
    sv, en, type: itemType, target, sets,
    hint_sv: document.getElementById("itemHintSv").value.trim(),
    hint_en: document.getElementById("itemHintEn").value.trim(),
  };
  gridItems[selectedCellIdx] = item;
  // Save to library if new
  saveToLibrary(item);
  closeItemModal();
  renderGrid();
}

async function saveToLibrary(item){
  // Check if already in library by sv text
  const existing = libraryCache.find(i => i.sv === item.sv);
  if (existing) return;
  try {
    const doc = await databases.createDocument(
      window.APPWRITE_DATABASE_ID, "items", "unique()",
      {
        sv: item.sv, en: item.en, type: item.type,
        default_target: item.target, default_sets: item.sets,
        hint_sv: item.hint_sv, hint_en: item.hint_en,
        usage_count: 1,
      }
    );
    libraryCache.push(doc);
    renderLibrary(document.getElementById("libSearch").value);
  } catch(e){
    console.error("Library save failed:", e);
  }
}

function closeItemModal(){
  document.getElementById("itemModal").classList.remove("show");
}

// ---------- Dates Modal ----------
function editDates(planId, startDate, endDate){
  editingDatesForPlan = planId;
  document.getElementById("editStart").value = startDate;
  document.getElementById("editEnd").value = endDate;
  document.getElementById("datesModal").classList.add("show");
}

async function saveDates(){
  if (!editingDatesForPlan) return;
  const start = document.getElementById("editStart").value;
  const end = document.getElementById("editEnd").value;
  try {
    await databases.updateDocument(window.APPWRITE_DATABASE_ID, "plans", editingDatesForPlan, {
      start_date: start, end_date: end,
      updated_at: new Date().toISOString(),
    });
    document.getElementById("datesModal").classList.remove("show");
    loadPlans();
  } catch(e){
    alert(e.message);
  }
}

// ---------- Publish ----------
function goToStep2(){
  if (!document.getElementById("planNameSv").value.trim()){
    alert(lang === "sv" ? "Fyll i plannamn" : "Fill in plan name");
    return;
  }
  showStep(2);
}

function goToStep3(){
  const filled = gridItems.filter(i => i !== null).length;
  if (filled < 36){
    alert(t("fillAllCells") + ` (${filled}/36)`);
    return;
  }
  renderReview();
  showStep(3);
}

function renderReview(){
  const name = document.getElementById("planNameSv").value;
  const start = document.getElementById("planStart").value;
  const end = document.getElementById("planEnd").value;
  document.getElementById("reviewSummary").innerHTML = `
    <div style="font-size:15px;font-weight:800">${escapeHtml(name)}</div>
    <div style="color:var(--muted);font-size:13px;margin-top:4px">📅 ${start} → ${end}</div>
  `;
  document.getElementById("reviewList").innerHTML = gridItems.map((item, i) => {
    const typeLabel = {text:"Text", reps:"Rep", timer:"Time"}[item.type];
    const targetLabel = item.target ? ` · ${item.target}${item.sets > 1 ? "×"+item.sets : ""}` : "";
    return `<div class="review-item">
      <span class="ri-num">#${i+1}</span>
      <span class="ri-text">${escapeHtml(item.sv)}${targetLabel}</span>
      <span class="ri-type ${item.type}">${typeLabel}</span>
    </div>`;
  }).join("");
}

async function publishPlan(){
  const name = document.getElementById("planNameSv").value.trim();
  const nameEn = document.getElementById("planNameEn").value.trim() || name;
  const start = document.getElementById("planStart").value;
  const end = document.getElementById("planEnd").value;
  if (!start || !end){
    alert(lang === "sv" ? "Fyll i datum" : "Fill in dates");
    return;
  }
  try {
    const now = new Date().toISOString();
    await databases.createDocument(
      window.APPWRITE_DATABASE_ID, "plans", "unique()",
      {
        name, name_en: nameEn, team_code: window.DEFAULT_TEAM_CODE || "GBK",
        items: JSON.stringify(gridItems),
        start_date: start, end_date: end,
        status: "published", created_at: now, updated_at: now,
      }
    );
    showStep(4);
    loadPlans();
  } catch(e){
    alert(e.message);
  }
}

function backToList(){
  document.getElementById("builderView").style.display = "none";
  document.getElementById("planListView").style.display = "block";
  loadPlans();
}

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ---------- Event handlers ----------
document.getElementById("langSv").onclick = () => setLang("sv");
document.getElementById("langEn").onclick = () => setLang("en");
document.getElementById("adminPwBtn").onclick = doLogin;
document.getElementById("adminPw").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
document.getElementById("pwToggle").onclick = () => {
  const input = document.getElementById("adminPw");
  const open = document.getElementById("eyeOpen");
  const closed = document.getElementById("eyeClosed");
  if (input.type === "password"){
    input.type = "text"; open.style.display = "none"; closed.style.display = "block";
  } else {
    input.type = "password"; open.style.display = "block"; closed.style.display = "none";
  }
};
document.getElementById("newPlanBtn").onclick = startNewPlan;
document.getElementById("backBtn").onclick = backToList;
document.getElementById("step1Next").onclick = goToStep2;
document.getElementById("step2Back").onclick = () => showStep(1);
document.getElementById("step2Next").onclick = goToStep3;
document.getElementById("step3Back").onclick = () => showStep(2);
document.getElementById("step3Publish").onclick = publishPlan;
document.getElementById("doneBtn").onclick = backToList;
document.getElementById("libSearch").oninput = (e) => renderLibrary(e.target.value);
document.getElementById("translateBtn").onclick = translateText;
document.getElementById("itemModalSave").onclick = saveItem;
document.getElementById("itemModalCancel").onclick = closeItemModal;
document.getElementById("itemModalClose").onclick = closeItemModal;
document.getElementById("itemModal").onclick = (e) => { if (e.target.id === "itemModal") closeItemModal(); };
document.querySelectorAll(".type-btn").forEach(btn => {
  btn.onclick = () => { itemType = btn.dataset.type; updateTypeButtons(); };
});
document.getElementById("datesModalSave").onclick = saveDates;
document.getElementById("datesModalCancel").onclick = () => document.getElementById("datesModal").classList.remove("show");
document.getElementById("datesModalClose").onclick = () => document.getElementById("datesModal").classList.remove("show");
document.getElementById("datesModal").onclick = (e) => { if (e.target.id === "datesModal") document.getElementById("datesModal").classList.remove("show"); };

// ---------- Init ----------
initAppwrite();
setLang(lang);
if (checkAuth()){
  loadPlans();
  loadLibrary();
}
</script>
